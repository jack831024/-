<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>訂位表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#16a34a; --green-dark:#15803d; --green-soft:#dcfce7; --green-line:#bbf7d0;
  --ink:#0f172a; --ink-2:#475569; --ink-3:#94a3b8; --line:#e2e8f0;
  --bg:#f8fafc; --warn:#d93025; --warn-soft:#fdecea;
  --combo:#7c3aed; --combo-soft:#ede9fe;
}
body{font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;padding:1rem;
  background:
    radial-gradient(900px 500px at 10% -10%,#dcfce7 0%,transparent 55%),
    radial-gradient(800px 500px at 110% 10%,#dbeafe 0%,transparent 55%),
    linear-gradient(180deg,#f8fafc 0%,#eef2f7 100%);
}
.user-bar{display:flex;align-items:center;gap:8px;max-width:760px;margin:0 auto 10px;padding:6px 4px;font-size:12px;color:#666;flex-wrap:wrap}
.user-bar .spacer{flex:1}
.back-btn-mini{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#475569;transition:all .18s;box-shadow:0 2px 6px -2px rgba(15,23,42,.08);flex-shrink:0}
.back-btn-mini:hover{background:#fff;color:var(--green);transform:translateX(-2px);border-color:var(--green-line)}
.back-btn-mini svg{width:16px;height:16px}
.store-chip{display:inline-flex;align-items:center;gap:8px;padding:5px 12px 5px 12px;background:rgba(255,255,255,.9);border:1px solid var(--green-line);border-radius:999px;box-shadow:0 2px 6px -2px rgba(15,23,42,.06);font-weight:600;color:var(--green-dark)}
.logout-link{color:#475569;cursor:pointer;text-decoration:none;font-size:12px;padding:6px 11px;border:1px solid #e2e8f0;border-radius:10px;background:rgba(255,255,255,.9);transition:all .18s;font-weight:500}
.logout-link:hover{background:#fff;color:var(--green);border-color:var(--green-line)}

.wrap{max-width:760px;margin:0 auto;padding:1rem 0 3rem}
h1{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-0.01em}
.subtitle{font-size:13px;color:var(--ink-2);margin-bottom:1.25rem}
h3{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:6px}
h3 .num{font-size:11px;font-weight:700;background:var(--green-soft);color:var(--green-dark);padding:2px 8px;border-radius:999px;letter-spacing:1px}
.section{background:#fff;border:1px solid var(--line);border-radius:14px;padding:1.1rem 1.25rem;margin-bottom:1rem;box-shadow:0 1px 2px rgba(15,23,42,.03)}

label.field{display:block;margin-bottom:12px}
label.field .lab{display:block;font-size:13px;color:var(--ink-2);margin-bottom:5px;font-weight:500}
input,select,button{font-family:inherit;font-size:14px;padding:9px 12px;border-radius:9px;border:1px solid var(--line);background:#fafafa;outline:none;width:100%}
input:focus,select:focus{border-color:var(--green);background:#fff}
button{background:var(--green);color:#fff;border:none;cursor:pointer;font-weight:600;padding:11px 16px;font-size:14px}
button:hover{background:var(--green-dark)}
button.ghost{background:#fff;color:var(--green-dark);border:1px solid var(--green-line)}
button.ghost:hover{background:var(--green-soft)}
button:disabled{opacity:.5;cursor:not-allowed}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1.2fr 1.2fr 0.8fr;gap:10px}
.info{font-size:12.5px;color:var(--ink-3);margin-top:4px}

.result{padding:12px 14px;border-radius:10px;margin-top:12px;font-size:14px;line-height:1.6}
.result.ok{background:var(--green-soft);color:var(--green-dark);border:1px solid var(--green-line)}
.result.fail{background:var(--warn-soft);color:var(--warn);border:1px solid #f5b7b1}
.result button{margin-top:10px;width:auto;padding:8px 16px;font-size:13px}
.result .match-line{font-size:16px;margin-top:4px}
.tag{display:inline-block;background:var(--green);color:#fff;padding:2px 10px;border-radius:5px;font-size:13px;font-weight:700;letter-spacing:0.5px}
.tag.combo{background:var(--combo)}
.store-select-wrap{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.9);border:1px solid var(--green-line);border-radius:999px;padding:3px 6px 3px 14px;box-shadow:0 2px 6px -2px rgba(15,23,42,.06)}
.store-select-wrap .pin{font-size:14px}
.store-select-wrap select.store-dropdown{border:none;background:transparent;font-size:13px;font-weight:600;color:var(--green-dark);padding:5px 26px 5px 4px;width:auto;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2315803d' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 6px center}
.store-select-wrap select.store-dropdown:focus{outline:none;background-color:transparent}

.list-lock{padding:18px 14px;text-align:center;border:1.5px dashed var(--green-line);border-radius:12px;background:linear-gradient(135deg,#f7fdf9 0%,#fafafa 100%)}
.list-lock .lock-icon{font-size:34px;margin-bottom:6px}
.list-lock .lock-msg{font-size:13.5px;color:var(--ink-2);margin-bottom:14px}
.list-lock .lock-msg strong{color:var(--green-dark)}
.list-lock .lock-form{display:flex;gap:8px;max-width:300px;margin:0 auto}
.list-lock .lock-form input{flex:1;background:#fff}
.list-lock .lock-form button{width:auto;padding:9px 18px;font-size:13px}
.list-lock .lock-err{font-size:13px;color:var(--warn);margin-top:8px;min-height:18px}

table.book-list{width:100%;border-collapse:collapse;margin-top:8px;font-size:13.5px}
table.book-list th{background:#f8fafc;color:var(--ink-2);font-size:12px;font-weight:600;text-align:left;padding:8px 8px;border-bottom:1px solid var(--line)}
table.book-list td{padding:9px 8px;border-bottom:1px solid #f0f4f8;vertical-align:middle}
table.book-list tr.group-start td{border-top:2px solid var(--green-line)}
table.book-list tr:first-child.group-start td{border-top:none}
table.book-list td.tcol{font-weight:700;color:var(--green-dark);background:#fafdfb;text-align:center;vertical-align:middle;width:74px}
table.book-list td.tcol .cap{display:block;font-size:11px;color:var(--ink-3);font-weight:500;margin-top:2px}
table.book-list td.tcol.combo{color:var(--combo);background:#faf8fe}
table.book-list .time{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-weight:600;color:var(--ink)}
table.book-list .delete-btn{background:#fff;color:var(--warn);border:1px solid #f5b7b1;padding:4px 10px;font-size:12px;font-weight:600;width:auto;border-radius:6px}
table.book-list .delete-btn:hover{background:var(--warn-soft)}
.list-summary{font-size:12.5px;color:var(--ink-2);margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #f0f4f8}
.empty{font-size:13px;color:var(--ink-3);text-align:center;padding:20px 0}

</style>
</head>
<body>

<div id="appWrap">
  <div class="user-bar">
    <a href="home.html" class="back-btn-mini" title="返回主選單">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <div class="store-select-wrap">
      <span class="pin">📍</span>
      <select id="storeSelect" class="store-dropdown" onchange="onStoreChange()">
        <option value="chudian-zhonghe">初殿中和</option>
        <option value="chudian-yongchun" selected>初殿永春</option>
        <option value="chudian-xinzhuang">初殿新莊</option>
      </select>
    </div>
    <span class="spacer"></span>
    <a class="logout-link" id="lockListLink" onclick="lockList()" hidden>🔒 鎖回列表</a>
  </div>

  <div class="wrap">
    <h1>訂位表</h1>
    <p class="subtitle" id="subtitle">永春店訂位管理</p>

    <div class="section">
      <h3><span class="num">01</span>新增訂位</h3>
      <div class="row2">
        <label class="field">
          <span class="lab">姓</span>
          <input id="surname" placeholder="王" maxlength="4">
        </label>
        <label class="field">
          <span class="lab">稱呼</span>
          <select id="title">
            <option>先生</option>
            <option>小姐</option>
          </select>
        </label>
      </div>
      <label class="field">
        <span class="lab">手機</span>
        <input id="phone" placeholder="0912345678" inputmode="numeric" maxlength="10">
      </label>
      <div class="row3">
        <label class="field">
          <span class="lab">日期</span>
          <input id="date" type="date">
        </label>
        <label class="field">
          <span class="lab">時間</span>
          <input id="time" type="time" step="600">
        </label>
        <label class="field">
          <span class="lab">人數</span>
          <input id="people" type="number" min="1" max="8" value="2">
        </label>
      </div>
      <p class="info">* 超過 8 位以上請來電本店訂位</p>
      <button onclick="findMatch()" style="margin-top:6px">🔍 查看匹配時間以及桌號</button>
      <div id="matchResult"></div>
    </div>

    <div class="section">
      <h3><span class="num">02</span>訂位列表</h3>

      <div id="listLock" class="list-lock">
        <div class="lock-icon">🔒</div>
        <div class="lock-msg">查看 <strong id="lockStoreName">初殿永春</strong> 訂位列表需要本店密碼</div>
        <div class="lock-form">
          <input type="password" id="listPwd" placeholder="輸入本店密碼" autocomplete="off">
          <button onclick="unlockList()">解鎖</button>
        </div>
        <div class="lock-err" id="listErr"></div>
      </div>

      <div id="listUnlocked" hidden>
        <label class="field">
          <span class="lab">查詢日期</span>
          <input id="viewDate" type="date" onchange="renderList()">
        </label>
        <div id="list"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 設定（密碼與小結報表 BONUS_PASSWORDS 同步）
// ============================================================
var BOOKING_PASSWORDS = {
  'chudian-zhonghe':   '90369287',
  'chudian-yongchun':  '94213054',
  'chudian-xinzhuang': '60749791'
};
var STORE_NAMES = {
  'chudian-zhonghe':   '初殿中和',
  'chudian-yongchun':  '初殿永春',
  'chudian-xinzhuang': '初殿新莊'
};

// 桌號設定
var STORE_TABLES = {
  'chudian-yongchun': [
    {id:'a1',cap:4},{id:'a2',cap:2},{id:'a3',cap:2},{id:'a4',cap:2},{id:'a5',cap:2},
    {id:'a6',cap:2},{id:'a7',cap:4},{id:'a8',cap:2},{id:'a9',cap:4},{id:'a10',cap:4},
    {id:'b1',cap:4},{id:'b2',cap:4},{id:'b3',cap:4},{id:'b4',cap:4},{id:'b5',cap:6}
  ],
  'chudian-zhonghe':   [],   // 待補
  'chudian-xinzhuang': []    // 待補
};
var COMBOS = {
  'chudian-yongchun': [
    {ids:['a6','a7'], cap:6},
    {ids:['a9','a10'],cap:8},
    {ids:['b1','b2'], cap:8},
    {ids:['b3','b4'], cap:8}
  ],
  'chudian-zhonghe':   [],
  'chudian-xinzhuang': []
};

var GAP_MIN = 100;
var LAST_ACCEPT = 21*60;
var WK_BLOCK_S = 18*60+1;
var WK_BLOCK_E = 19*60+39;

var STORE_ID = 'chudian-yongchun';   // 預設永春
var lastMatch = null;

// ============================================================
// 工具
// ============================================================
function $(id){ return document.getElementById(id); }
function timeToMin(t){ var p=t.split(':'); return parseInt(p[0],10)*60 + parseInt(p[1],10); }
function minToTime(m){ var h=Math.floor(m/60),mm=m%60; return (h<10?'0':'')+h+':'+(mm<10?'0':'')+mm; }
function isWeekend(d){ var x=new Date(d+'T00:00:00').getDay(); return x===0||x===6; }
function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function getReservations(){
  try { return JSON.parse(localStorage.getItem('bookings_v1')||'[]'); }
  catch(e){ return []; }
}
function saveReservations(arr){ localStorage.setItem('bookings_v1', JSON.stringify(arr)); }
function bookingsForTable(date, tableId){
  return getReservations().filter(function(r){
    return r.store===STORE_ID && r.date===date && r.tables.indexOf(tableId)>=0;
  });
}
function getTableCap(tableId){
  var t = (STORE_TABLES[STORE_ID]||[]).filter(function(x){return x.id===tableId})[0];
  return t ? t.cap : '';
}

// ============================================================
// 桌號可用性
// ============================================================
function checkTableAvailable(date, time, tableId){
  var newMin = timeToMin(time);
  if (newMin > LAST_ACCEPT) return {ok:false, reason:'最後接客時間 21:00'};

  var existing = bookingsForTable(date, tableId);
  for (var i=0;i<existing.length;i++){
    var em = timeToMin(existing[i].time);
    if (Math.abs(newMin-em) < GAP_MIN){
      return {ok:false, reason:'與 '+existing[i].time+' 訂位間隔未達 '+GAP_MIN+' 分鐘'};
    }
  }

  if (isWeekend(date)){
    var inBlock = newMin >= WK_BLOCK_S && newMin <= WK_BLOCK_E;
    if (inBlock){
      var ex = false;
      for (var j=0;j<existing.length;j++){
        if (Math.abs(newMin - timeToMin(existing[j].time)) === GAP_MIN){ ex=true; break; }
      }
      if (!ex) return {ok:false, reason:'假日只接 18:00 之前 或 19:40 之後'};
    }
  }
  return {ok:true};
}

function findCandidates(people){
  var tables = STORE_TABLES[STORE_ID]||[];
  var combos = COMBOS[STORE_ID]||[];
  var list = [];
  tables.filter(function(t){return t.cap>=people}).sort(function(a,b){return a.cap-b.cap})
    .forEach(function(t){ list.push({kind:'single', ids:[t.id], cap:t.cap, label:t.id}); });
  combos.filter(function(c){return c.cap>=people}).sort(function(a,b){return a.cap-b.cap})
    .forEach(function(c){ list.push({kind:'combo', ids:c.ids, cap:c.cap, label:c.ids.join('+')}); });
  return list;
}
function checkCandidate(c, date, time){
  for (var i=0;i<c.ids.length;i++){
    var r = checkTableAvailable(date, time, c.ids[i]);
    if (!r.ok) return r;
  }
  return {ok:true};
}
// 當日是否還有任何可訂的時段（用於失敗訊息判斷）
function hasAnyAvailableSlot(date, people){
  var cands = findCandidates(people);
  if (cands.length===0) return false;
  for (var t=11*60; t<=LAST_ACCEPT; t+=30){
    var ts = minToTime(t);
    for (var i=0;i<cands.length;i++){
      if (checkCandidate(cands[i], date, ts).ok) return true;
    }
  }
  return false;
}

// ============================================================
// 流程
// ============================================================
function readForm(){
  return {
    store:   STORE_ID,
    surname: $('surname').value.trim(),
    title:   $('title').value,
    phone:   $('phone').value.trim(),
    date:    $('date').value,
    time:    $('time').value,
    people:  parseInt($('people').value,10)
  };
}
function showResult(html, ok){
  var el = $('matchResult');
  el.className = 'result ' + (ok?'ok':'fail');
  el.innerHTML = html;
}
function findMatch(){
  var f = readForm();
  if (!f.surname) return showResult('請輸入姓', false);
  if (!/^09\d{8}$/.test(f.phone)) return showResult('手機格式錯誤（需為 09 開頭共 10 碼）', false);
  if (!f.date)    return showResult('請選擇日期', false);
  if (!f.time)    return showResult('請選擇時間', false);
  if (!f.people || f.people<1) return showResult('請輸入人數', false);
  if (f.people>8) return showResult('超過 8 位請來電本店訂位', false);

  if (!STORE_TABLES[STORE_ID] || STORE_TABLES[STORE_ID].length===0){
    return showResult(STORE_NAMES[STORE_ID]+' 桌號資料尚未設定', false);
  }

  var cands = findCandidates(f.people);
  if (cands.length===0) return showResult('無符合人數的桌位設定', false);

  for (var i=0;i<cands.length;i++){
    var c = cands[i];
    if (checkCandidate(c, f.date, f.time).ok){
      lastMatch = {store:f.store, surname:f.surname, title:f.title, phone:f.phone,
                   date:f.date, time:f.time, people:f.people, tables:c.ids};
      var tagCls = c.kind==='combo'?'tag combo':'tag';
      showResult(
        '<div>✓ 可訂位</div>'+
        '<div class="match-line"><span class="'+tagCls+'">'+c.label+'</span>'+
        '&nbsp;&nbsp;<strong>'+f.time+'</strong>'+
        '&nbsp;&nbsp;'+f.surname+f.title+' '+f.people+' 位</div>'+
        '<div class="info" style="color:#15803d">手機 '+f.phone+'　'+f.date+
        '（'+(isWeekend(f.date)?'假日':'平日')+'）</div>'+
        '<button onclick="confirmReserve()">確認訂位</button>',
        true
      );
      return;
    }
  }

  if (hasAnyAvailableSlot(f.date, f.people)){
    showResult('只能訂 18:00 之前的位置 或 19:40 之後的位置', false);
  } else {
    showResult('✗ 此時段無可用桌位', false);
  }
  lastMatch = null;
}

function confirmReserve(){
  if (!lastMatch) return;
  for (var i=0;i<lastMatch.tables.length;i++){
    var r = checkTableAvailable(lastMatch.date, lastMatch.time, lastMatch.tables[i]);
    if (!r.ok){
      showResult('該時段已被其他訂位佔用，請重新查詢', false);
      lastMatch = null; return;
    }
  }
  var all = getReservations();
  all.push(Object.assign({}, lastMatch, {
    id: Date.now()+':'+Math.random().toString(36).slice(2,8),
    createdAt: new Date().toISOString()
  }));
  saveReservations(all);

  var saved = lastMatch; lastMatch = null;
  $('matchResult').className = 'result ok';
  $('matchResult').innerHTML =
    '<strong>✓ 訂位完成</strong>'+
    '<div class="info" style="color:#15803d;margin-top:4px">'+
      saved.tables.join('+')+'　'+saved.date+' '+saved.time+'　'+
      saved.surname+saved.title+' '+saved.people+' 位</div>';

  $('surname').value=''; $('phone').value=''; $('time').value=''; $('people').value=2;
  if (!$('viewDate').value) $('viewDate').value = saved.date;
  renderList();
}

// ============================================================
// 訂位列表（同桌號合併）— 需密碼解鎖
// ============================================================
function renderList(){
  if (!isListUnlocked()) return;
  var date = $('viewDate').value;
  var el = $('list');
  if (!date){ el.innerHTML = '<div class="empty">請選擇查詢日期</div>'; return; }

  var items = getReservations()
    .filter(function(r){ return r.date===date && r.store===STORE_ID; })
    .sort(function(a,b){ return timeToMin(a.time)-timeToMin(b.time); });

  var summary = '<div class="list-summary">'+
    STORE_NAMES[STORE_ID]+'　'+date+'（'+(isWeekend(date)?'假日':'平日')+'）　共 '+items.length+' 筆</div>';

  if (items.length===0){
    el.innerHTML = summary + '<div class="empty">當日無訂位</div>';
    return;
  }

  // 同桌號分組（單桌 a1、a1；併桌 a6+a7 各為一組）
  var groups = {};
  var groupOrder = [];
  items.forEach(function(r){
    var key = r.tables.join('+');
    if (!groups[key]){ groups[key]=[]; groupOrder.push(key); }
    groups[key].push(r);
  });

  // 桌號排序：a 系列數字優先、再 b 系列；併桌依首桌排序
  groupOrder.sort(function(a,b){
    function rank(k){
      var first = k.split('+')[0];
      var m = first.match(/^([a-z]+)(\d+)$/i);
      if (!m) return [9,9,k];
      return [m[1].toLowerCase().charCodeAt(0), parseInt(m[2],10), k];
    }
    var ra=rank(a), rb=rank(b);
    if (ra[0]!==rb[0]) return ra[0]-rb[0];
    if (ra[1]!==rb[1]) return ra[1]-rb[1];
    return a.length - b.length;
  });

  var html = summary +
    '<table class="book-list"><thead><tr>'+
    '<th>桌號</th><th>時間</th><th>姓名</th><th>人數</th><th>手機</th><th></th>'+
    '</tr></thead><tbody>';

  groupOrder.forEach(function(key){
    var rows = groups[key].sort(function(a,b){return timeToMin(a.time)-timeToMin(b.time)});
    var isCombo = key.indexOf('+')>=0;
    var capLabel;
    if (isCombo){
      var combo = (COMBOS[STORE_ID]||[]).filter(function(c){return c.ids.join('+')===key})[0];
      capLabel = combo ? combo.cap+'人' : '';
    }else{
      var c = getTableCap(key);
      capLabel = c ? c+'人' : '';
    }

    rows.forEach(function(r, idx){
      var startCls = idx===0 ? 'group-start' : '';
      html += '<tr class="'+startCls+'">';
      if (idx===0){
        html += '<td class="tcol '+(isCombo?'combo':'')+'" rowspan="'+rows.length+'">'+
                key + (capLabel?'<span class="cap">'+capLabel+'</span>':'') +'</td>';
      }
      html += '<td class="time">'+r.time+'</td>'+
              '<td>'+r.surname+r.title+'</td>'+
              '<td>'+r.people+' 位</td>'+
              '<td>'+r.phone+'</td>'+
              '<td><button class="delete-btn" onclick="delRes(\''+r.id+'\')">取消</button></td>'+
              '</tr>';
    });
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

function delRes(id){
  if (!confirm('確定取消此訂位？')) return;
  saveReservations(getReservations().filter(function(r){return r.id!==id}));
  renderList();
}

// ============================================================
// 訂位列表密碼鎖（每店各自密碼，與小結報表獎金同步）
// ============================================================
function isListUnlocked(){
  return sessionStorage.getItem('booking_list_unlocked_'+STORE_ID) === '1';
}
function unlockList(){
  var pwd = ($('listPwd').value||'').trim();
  var expected = BOOKING_PASSWORDS[STORE_ID];
  if (!expected){
    $('listErr').textContent = '此分店尚未設定密碼';
    return;
  }
  if (pwd !== expected){
    $('listErr').textContent = '❌ 密碼錯誤';
    $('listPwd').value = ''; $('listPwd').focus();
    if (navigator.vibrate) navigator.vibrate([50,30,50]);
    return;
  }
  sessionStorage.setItem('booking_list_unlocked_'+STORE_ID, '1');
  $('listErr').textContent = '';
  $('listPwd').value = '';
  refreshListLockState();
}
function lockList(){
  if (!confirm('確定要鎖回訂位列表嗎？下次查看需重新輸入密碼。')) return;
  sessionStorage.removeItem('booking_list_unlocked_'+STORE_ID);
  refreshListLockState();
}
function refreshListLockState(){
  var unlocked = isListUnlocked();
  $('listLock').hidden       = unlocked;
  $('listUnlocked').hidden   = !unlocked;
  $('lockListLink').hidden   = !unlocked;
  $('lockStoreName').textContent = STORE_NAMES[STORE_ID];
  if (unlocked){
    if (!$('viewDate').value) $('viewDate').value = todayStr();
    renderList();
  }
}

// 切換分店
function onStoreChange(){
  STORE_ID = $('storeSelect').value;
  $('subtitle').textContent = STORE_NAMES[STORE_ID]+'店訂位管理';
  $('matchResult').innerHTML = '';
  lastMatch = null;
  refreshListLockState();
}

$('listPwd').addEventListener('keydown', function(e){ if (e.key==='Enter') unlockList(); });

// 初始化
(function init(){
  STORE_ID = $('storeSelect').value || 'chudian-yongchun';
  $('subtitle').textContent = STORE_NAMES[STORE_ID]+'店訂位管理';
  if (!$('date').value) $('date').value = todayStr();
  refreshListLockState();
})();
</script>
