<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>內部系統主頁</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#3b82f6;
  --brand-dark:#2563eb;
  --accent:#f97316;
  --accent-dark:#ea580c;
  --ink:#0f172a;
  --ink-2:#475569;
  --ink-3:#94a3b8;
  --line:#e2e8f0;
  --bg:#f8fafc;
}
html,body{height:100%}
body{font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);min-height:100vh;padding:1.5rem;position:relative;overflow-x:hidden;
  background:
    radial-gradient(1200px 600px at 10% -10%, #dbeafe 0%, transparent 50%),
    radial-gradient(900px 500px at 110% 10%, #fde4d3 0%, transparent 55%),
    radial-gradient(800px 600px at 50% 120%, #e0e7ff 0%, transparent 60%),
    linear-gradient(180deg,#f8fafc 0%,#eef2f7 100%);
}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:
  radial-gradient(circle at 50% 50%, transparent 0, rgba(255,255,255,0) 70%, rgba(15,23,42,0.04) 100%);}

.stage{max-width:640px;margin:0 auto;padding:3rem 0 2rem}
.brand-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:2rem;color:var(--ink-2);font-size:12px;letter-spacing:3px;font-weight:500;text-transform:uppercase}
.brand-row .dot{width:6px;height:6px;border-radius:50%;background:var(--brand);box-shadow:0 0 12px var(--brand)}

.hero{text-align:center;margin-bottom:2.5rem}
.hero-logo{width:80px;height:80px;margin:0 auto 1.25rem;border-radius:24px;background:linear-gradient(135deg,#fff 0%,#f1f5f9 100%);box-shadow:0 10px 30px -10px rgba(59,130,246,.35),0 0 0 1px rgba(15,23,42,.04),inset 0 1px 0 rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:42px;line-height:1}
h1{font-size:28px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;background:linear-gradient(135deg,#0f172a 0%,#475569 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:14px;color:var(--ink-2)}

.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:2rem}
.menu-card{background:rgba(255,255,255,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.8);border-radius:20px;padding:1.75rem 1.5rem;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);text-align:left;display:flex;flex-direction:column;gap:10px;font-family:inherit;color:inherit;position:relative;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -12px rgba(15,23,42,.08)}
.menu-card::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0) 0%,rgba(255,255,255,0) 60%,rgba(255,255,255,.5) 100%);pointer-events:none;opacity:.7}
.menu-card::after{content:"";position:absolute;top:-1px;left:-1px;right:-1px;height:2px;border-radius:20px 20px 0 0;opacity:0;transition:opacity .25s}
.menu-card:hover{transform:translateY(-4px);box-shadow:0 1px 2px rgba(15,23,42,.04),0 24px 48px -16px rgba(15,23,42,.18)}
.menu-card:hover::after{opacity:1}
.menu-card:active{transform:translateY(-1px)}

.menu-card .num{position:absolute;top:16px;right:16px;font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:11px;font-weight:600;color:var(--ink-3);background:rgba(15,23,42,.04);border-radius:999px;padding:4px 10px;letter-spacing:1px}
.menu-card .icon-wrap{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;line-height:1;margin-bottom:6px;transition:all .25s}
.menu-card .mtitle{font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-0.01em}
.menu-card .mdesc{font-size:12.5px;color:var(--ink-2);line-height:1.6}
.menu-card .mgo{font-size:12px;font-weight:600;margin-top:auto;padding-top:12px;display:flex;align-items:center;gap:6px;letter-spacing:0.02em}
.menu-card .mgo svg{transition:transform .25s}
.menu-card:hover .mgo svg{transform:translateX(4px)}

.menu-card.summary .icon-wrap{background:linear-gradient(135deg,#dbeafe 0%,#bfdbfe 100%);color:var(--brand)}
.menu-card.summary::after{background:linear-gradient(90deg,var(--brand),#60a5fa)}
.menu-card.summary:hover .icon-wrap{background:linear-gradient(135deg,var(--brand) 0%,#60a5fa 100%);color:#fff;transform:scale(1.05)}
.menu-card.summary .mgo{color:var(--brand)}

.menu-card.inventory .icon-wrap{background:linear-gradient(135deg,#fed7aa 0%,#fdba74 100%);color:var(--accent)}
.menu-card.inventory::after{background:linear-gradient(90deg,var(--accent),#fb923c)}
.menu-card.inventory:hover .icon-wrap{background:linear-gradient(135deg,var(--accent) 0%,#fb923c 100%);color:#fff;transform:scale(1.05)}
.menu-card.inventory .mgo{color:var(--accent)}

.menu-card.order .icon-wrap{background:linear-gradient(135deg,#dcfce7 0%,#bbf7d0 100%);color:#16a34a}
.menu-card.order::after{background:linear-gradient(90deg,#16a34a,#4ade80)}
.menu-card.order:hover .icon-wrap{background:linear-gradient(135deg,#16a34a 0%,#22c55e 100%);color:#fff;transform:scale(1.05)}
.menu-card.order .mgo{color:#16a34a}

.footer{text-align:center;font-size:11px;color:var(--ink-3);letter-spacing:1px;margin-top:1rem}
.footer .year{font-weight:600;color:var(--ink-2)}

@media(max-width:480px){
  body{padding:1rem}
  .stage{padding:1.5rem 0 1rem}
  .menu-grid{grid-template-columns:1fr;gap:12px}
  h1{font-size:24px}
  .hero-logo{width:68px;height:68px;font-size:36px;border-radius:20px}
}
</style>
</head>
<body>
<div class="stage">
  <div class="brand-row">
    <span class="dot"></span>
    <span>INTERNAL · MANAGEMENT</span>
  </div>

  <div class="hero">
    <div class="hero-logo">🏪</div>
    <h1>內部管理系統</h1>
    <p class="subtitle">請選擇要使用的功能</p>
  </div>

  <div class="menu-grid">
    <button class="menu-card summary" onclick="goFlow('summary')">
      <span class="num">01</span>
      <span class="icon-wrap">📋</span>
      <span class="mtitle">小結報表</span>
      <span class="mdesc">每日收入確認、員工獎金計算、<br>照片上傳與 AI 辨識</span>
      <span class="mgo">進入 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></span>
    </button>
    <button class="menu-card inventory" onclick="goFlow('inventory')">
      <span class="num">02</span>
      <span class="icon-wrap">📦</span>
      <span class="mtitle">盤點表</span>
      <span class="mdesc">食材、耗材庫存盤點紀錄，<br>支援每日與每週盤點</span>
      <span class="mgo">進入 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></span>
    </button>
    <button class="menu-card order" onclick="goOrder()">
      <span class="num">03</span>
      <span class="icon-wrap">🛒</span>
      <span class="mtitle">叫貨系統</span>
      <span class="mdesc">依今日銷售預估明日叫貨量，<br>湯底／肉品／蔬菜自動推算</span>
      <span class="mgo">進入 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></span>
    </button>
  </div>

  <p class="footer">© <span class="year">2026</span> · INTERNAL SYSTEM</p>
</div>

<script>
function goFlow(flow){
  sessionStorage.setItem('cd_flow', flow);
  sessionStorage.removeItem('cd_store');
  sessionStorage.removeItem('cd_store_name');
  window.location.href = 'index.html';
}
function goOrder(){
  window.location.href = 'order.html';
}
</script>
</body>
</html>
