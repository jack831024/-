<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>考核紀錄</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#4f46e5;
  --brand-dark:#4338ca;
  --ink:#0f172a;
  --ink-2:#475569;
  --ink-3:#94a3b8;
  --line:#e2e8f0;
  --ok:#059669;
  --bad:#dc2626;
  --warn:#d97706;
}
html,body{min-height:100%}
body{font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);min-height:100vh;padding:1.25rem;overflow-x:hidden;
  background:
    radial-gradient(1200px 600px at 10% -10%, #e0e7ff 0%, transparent 50%),
    radial-gradient(900px 500px at 110% 10%, #fde4d3 0%, transparent 55%),
    linear-gradient(180deg,#f8fafc 0%,#eef2f7 100%);
}
.wrap{max-width:860px;margin:0 auto;padding-bottom:3rem}

.back-btn{position:fixed;top:16px;left:16px;width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-2);transition:all .2s;box-shadow:0 4px 12px -4px rgba(15,23,42,.1);z-index:10}
.back-btn:hover{background:#fff;color:var(--brand)}
.back-btn svg{width:18px;height:18px}

.hero{text-align:center;margin:2.2rem 0 1.2rem}
h1{font-size:24px;font-weight:700;letter-spacing:-0.02em}
.subtitle{font-size:13px;color:var(--ink-2);margin-top:4px}

/* 店家選擇 */
.store-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.store-chip{padding:9px 18px;border-radius:999px;border:1.5px solid var(--line);background:rgba(255,255,255,.8);font-family:inherit;font-size:14px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:all .18s}
.store-chip:hover{border-color:var(--brand);color:var(--brand)}
.store-chip.on{background:linear-gradient(135deg,var(--brand),#818cf8);border-color:transparent;color:#fff;box-shadow:0 6px 16px -6px rgba(79,70,229,.5)}

/* 月份列 */
.month-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px}
.mbtn{width:34px;height:34px;border-radius:10px;border:1.5px solid var(--line);background:#fff;cursor:pointer;font-size:15px;color:var(--ink-2);transition:all .15s}
.mbtn:hover{border-color:var(--brand);color:var(--brand)}
.mlabel{font-size:17px;font-weight:700;letter-spacing:1px;min-width:120px;text-align:center}

/* 說明區 */
.rules{background:rgba(255,255,255,.8);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.9);border-radius:18px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -12px rgba(15,23,42,.08)}
.rules summary{padding:14px 18px;cursor:pointer;font-size:14.5px;font-weight:700;color:var(--ink);list-style:none;display:flex;align-items:center;gap:8px;user-select:none}
.rules summary::-webkit-details-marker{display:none}
.rules summary .arr{margin-left:auto;color:var(--ink-3);transition:transform .2s;font-size:12px}
.rules[open] summary .arr{transform:rotate(180deg)}
.rules-body{padding:0 18px 16px}
.rules-body ol{margin:0 0 14px 1.3rem;font-size:13.5px;color:var(--ink-2);line-height:2}
/* 考核檢查細項 */
.chk-section{margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
.chk-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.chk-title{font-size:12.5px;font-weight:700;color:var(--ink-2)}
.chk-count{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;background:rgba(79,70,229,.08);color:var(--brand)}
.chk-count.done{background:rgba(5,150,105,.12);color:var(--ok)}
.chk-group-title{font-size:12px;font-weight:700;color:var(--brand-dark);margin:8px 0 4px}
.chk-item{display:flex;align-items:flex-start;gap:8px;padding:5px 2px;font-size:13px;color:var(--ink-2);cursor:pointer;user-select:none;border-radius:8px}
.chk-item:hover{background:rgba(79,70,229,.04)}
.chk-item input{accent-color:var(--brand);width:16px;height:16px;margin-top:2px;flex:none}
.chk-item.checked{color:var(--ink);text-decoration:none}
.chk-item.checked .chk-text{color:var(--ink-3);text-decoration:line-through}
.chk-note{font-size:11.5px;color:var(--warn);background:rgba(217,119,6,.07);border-radius:8px;padding:7px 10px;margin-top:8px}
.chk-del{margin-left:auto;border:none;background:none;color:var(--ink-3);cursor:pointer;font-size:13px;padding:0 4px;flex:none}
.chk-del:hover{color:var(--bad)}
.chk-add-item{display:block;margin:4px 0 2px;border:1px dashed var(--line);background:none;border-radius:8px;padding:6px 12px;font-family:inherit;font-size:12px;font-weight:600;color:var(--brand);cursor:pointer}
.chk-add-item:hover{border-color:var(--brand);background:rgba(79,70,229,.04)}

/* 工具列 */
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tbtn{padding:9px 16px;border-radius:12px;border:1.5px solid var(--line);background:rgba(255,255,255,.85);font-family:inherit;font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:6px}
.tbtn:hover{border-color:var(--brand);color:var(--brand)}
.tbtn.primary{background:linear-gradient(135deg,var(--brand),#818cf8);border-color:transparent;color:#fff;box-shadow:0 6px 16px -6px rgba(79,70,229,.5)}
.tbtn.primary:hover{transform:translateY(-1px)}
.tbtn.danger{color:var(--bad)}
.tbtn:disabled{opacity:.5;cursor:not-allowed}
.spacer{flex:1}
.sync-chip{font-size:12px;font-weight:600;padding:7px 12px;border-radius:999px;border:none;cursor:pointer;font-family:inherit}
.sync-chip.idle{background:rgba(5,150,105,.1);color:var(--ok)}
.sync-chip.dirty{background:rgba(217,119,6,.12);color:var(--warn)}
.sync-chip.saving{background:rgba(79,70,229,.1);color:var(--brand)}
.sync-chip.err{background:rgba(220,38,38,.1);color:var(--bad)}
.edit-badge{font-size:12px;font-weight:700;padding:7px 12px;border-radius:999px;background:rgba(220,38,38,.08);color:var(--bad)}

/* 員工卡片 */
.emp-list{display:flex;flex-direction:column;gap:12px}
.emp-card{background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.9);border-radius:18px;padding:16px 18px;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -12px rgba(15,23,42,.08)}
.emp-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.emp-name{font-size:16.5px;font-weight:700}
.lv-chip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;letter-spacing:1px}
.lv-chip.staff{background:rgba(59,130,246,.1);color:#2563eb}
.lv-chip.cadre{background:rgba(217,119,6,.12);color:var(--warn)}
.cum-chip{font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:999px;background:rgba(15,23,42,.05);color:var(--ink-2)}
.cum-chip.raise{background:rgba(5,150,105,.12);color:var(--ok)}

/* 已通過站別迷你勳章 */
.ps-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:10px}
.mini-badge{display:inline-flex;align-items:center;justify-content:center;font-weight:800;position:relative;user-select:none}

/* 正職：圓形綠勳章 */
.mini-badge.g-staff{width:30px;height:30px;border-radius:50%;font-size:12.5px;background:rgba(15,23,42,.04);color:var(--ink-3);border:1.5px solid var(--line)}
.mini-badge.g-staff.on{
  background:radial-gradient(circle at 30% 25%, #e8c39e 0%, #c08552 40%, #8c5a2b 75%, #5f3c1a 100%);
  color:#fff7ec;border:none;text-shadow:0 1px 2px rgba(60,30,10,.6);
  box-shadow:inset 0 1.5px 2px rgba(255,240,215,.6), inset 0 -2px 3px rgba(70,40,15,.45),
             0 3px 8px -2px rgba(120,75,35,.6), 0 0 0 2px rgba(192,133,82,.3);
}

/* 幹部：金色六角勳章（更高級） */
.mini-badge.g-cadre{width:34px;height:34px;font-size:13px;
  clip-path:polygon(50% 0%, 95% 26%, 95% 74%, 50% 100%, 5% 74%, 5% 26%);
  background:rgba(15,23,42,.05);color:var(--ink-3);
}
.mini-badge.g-cadre::before{content:"";position:absolute;inset:1.5px;
  clip-path:polygon(50% 0%, 95% 26%, 95% 74%, 50% 100%, 5% 74%, 5% 26%);
  background:#f8fafc;z-index:-1;
}
.mini-badge.g-cadre{z-index:0}
.mini-badge.g-cadre.on{
  background:linear-gradient(150deg, #fde68a 0%, #f5b942 40%, #c98a1b 75%, #8a5a0b 100%);
  color:#ffe9b8;text-shadow:0 1px 2px rgba(70,8,8,.75);letter-spacing:.5px;
  filter:drop-shadow(0 3px 6px rgba(140,25,25,.5));
}
.mini-badge.g-cadre.on::before{
  background:linear-gradient(155deg, #e23a3a 0%, #b01d1d 45%, #7c1010 100%);
  box-shadow:inset 0 2px 3px rgba(255,220,150,.4), inset 0 -2px 4px rgba(60,5,5,.5);
}
.mini-badge.g-cadre.on::after{content:"";position:absolute;top:3px;left:6px;right:14px;height:8px;
  clip-path:polygon(50% 0%, 95% 26%, 95% 74%, 50% 100%, 5% 74%, 5% 26%);
  background:linear-gradient(180deg, rgba(255,236,180,.6), rgba(255,236,180,0));pointer-events:none;
}

.mini-badge.clickable{cursor:pointer;transition:transform .15s}
.mini-badge.clickable:hover{transform:scale(1.15)}
.ps-divider{width:1px;height:22px;background:var(--line);margin:0 5px}

/* 調薪提示 */
.raise-banner{margin-top:10px;padding:9px 14px;border-radius:12px;font-size:13px;font-weight:700;color:var(--ok);background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.25)}
.status-chip{margin-left:auto;font-size:12.5px;font-weight:700;padding:5px 13px;border-radius:999px}
.status-chip.pass{background:rgba(5,150,105,.12);color:var(--ok)}
.status-chip.fail{background:rgba(220,38,38,.1);color:var(--bad)}
.status-chip.none{background:rgba(15,23,42,.05);color:var(--ink-3)}
.status-chip.locked{background:rgba(217,119,6,.12);color:var(--warn)}

.emp-body{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;align-items:center}
.field{display:flex;flex-direction:column;gap:4px}
.flabel{font-size:11px;font-weight:600;color:var(--ink-3);letter-spacing:.5px}
select.fsel,input.fin{padding:8px 10px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-family:inherit;font-size:13.5px;color:var(--ink);outline:none}
select.fsel:focus,input.fin:focus{border-color:var(--brand)}
select.fsel:disabled,input.fin:disabled{background:#f8fafc;color:var(--ink-2)}
.late-toggle{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;user-select:none;padding:8px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff}
.late-toggle input{accent-color:var(--bad);width:16px;height:16px}
.late-toggle.on{border-color:rgba(220,38,38,.4);background:rgba(220,38,38,.05);color:var(--bad)}
.pass-seg{display:flex;border:1.5px solid var(--line);border-radius:10px;overflow:hidden}
.pass-seg button{padding:8px 14px;border:none;background:#fff;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink-3);cursor:pointer}
.pass-seg button.on-pass{background:var(--ok);color:#fff}
.pass-seg button.on-fail{background:var(--bad);color:#fff}
.pass-seg button:disabled{cursor:not-allowed}

/* 失誤 */
.mistakes{margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
.mk-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mk-title{font-size:12.5px;font-weight:700;color:var(--ink-2)}
.mk-count{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;background:rgba(15,23,42,.05);color:var(--ink-2)}
.mk-count.full{background:rgba(220,38,38,.1);color:var(--bad)}
.mk-add{margin-left:auto;font-size:12px;font-weight:600;color:var(--brand);background:none;border:none;cursor:pointer;font-family:inherit}
.mk-add:disabled{color:var(--ink-3);cursor:not-allowed}
.mk-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.mk-row input[type=date]{padding:6px 8px;border:1.5px solid var(--line);border-radius:8px;font-family:inherit;font-size:12.5px}
.mk-row input.mk-reason{flex:1;min-width:140px;padding:6px 10px;border:1.5px solid var(--line);border-radius:8px;font-family:inherit;font-size:12.5px}
.mk-del{border:none;background:none;color:var(--bad);cursor:pointer;font-size:14px}
.mk-empty{font-size:12px;color:var(--ink-3)}

.emp-foot{margin-top:10px;display:flex;justify-content:flex-end}
.emp-remove{font-size:11.5px;color:var(--ink-3);background:none;border:none;cursor:pointer;font-family:inherit}
.emp-remove:hover{color:var(--bad)}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--ink-3);font-size:14px;background:rgba(255,255,255,.6);border-radius:18px;border:1px dashed var(--line)}

/* 門市選擇（複製 index.html 小結選店樣式） */
.picker{width:100%;max-width:520px;margin:.5rem auto 0}
.pk-brand-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:1.75rem;color:var(--ink-2);font-size:11px;letter-spacing:3px;font-weight:500;text-transform:uppercase}
.pk-dot{width:6px;height:6px;border-radius:50%;background:#3b82f6;box-shadow:0 0 12px #3b82f6}
.pk-hero{text-align:center;margin-bottom:2rem}
.pk-logo{width:72px;height:72px;margin:0 auto 1rem;border-radius:20px;background:linear-gradient(135deg,#fff 0%,#f1f5f9 100%);box-shadow:0 10px 30px -10px rgba(59,130,246,.35),0 0 0 1px rgba(15,23,42,.04),inset 0 1px 0 rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:36px;line-height:1}
.pk-title{font-size:24px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;background:linear-gradient(135deg,#0f172a 0%,#475569 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.pk-sub{font-size:13px;color:var(--ink-2)}
.store-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
.store-btn{background:rgba(255,255,255,.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.8);border-radius:18px;padding:1.25rem 1rem;cursor:pointer;transition:all .22s cubic-bezier(.4,0,.2,1);text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:inherit;color:inherit;position:relative;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,.04),0 6px 18px -10px rgba(15,23,42,.1)}
.store-btn::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .22s}
.store-btn:hover{transform:translateY(-3px);box-shadow:0 1px 2px rgba(15,23,42,.04),0 18px 36px -14px rgba(15,23,42,.15)}
.store-btn:hover::after{opacity:1}
.store-btn:active{transform:translateY(-1px)}
.store-btn .sb-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;line-height:1;margin-bottom:4px;transition:all .22s}
.store-btn .brand-label{font-size:10px;color:var(--ink-3);font-weight:600;letter-spacing:2px;text-transform:uppercase}
.store-btn .name{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-0.01em}
.store-btn.chudian .sb-icon{background:linear-gradient(135deg,#fed7aa 0%,#fdba74 100%);color:#f97316}
.store-btn.chudian::after{background:linear-gradient(90deg,#f97316,#fb923c)}
.store-btn.chudian:hover .sb-icon{background:linear-gradient(135deg,#f97316 0%,#fb923c 100%);color:#fff;transform:scale(1.06)}
.store-btn.shicheng .sb-icon{background:linear-gradient(135deg,#dbeafe 0%,#bfdbfe 100%);color:#3b82f6}
.store-btn.shicheng::after{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.store-btn.shicheng:hover .sb-icon{background:linear-gradient(135deg,#3b82f6 0%,#60a5fa 100%);color:#fff;transform:scale(1.06)}
@media(max-width:420px){
  .store-grid{grid-template-columns:1fr}
}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:11px 20px;border-radius:12px;font-size:13.5px;font-weight:600;color:#fff;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw}
.toast.ok{background:#059669}
.toast.err{background:#dc2626}
.toast.show{opacity:1}

.hint-banner{font-size:12.5px;color:var(--warn);background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.25);border-radius:12px;padding:10px 14px;margin-bottom:12px;display:none}
.hint-banner.show{display:block}

@media(max-width:600px){
  body{padding:.9rem}
  .emp-body{gap:8px}
  .field{flex:1;min-width:45%}
  select.fsel{width:100%}
  .status-chip{margin-left:0}
  /* 徽章分兩列：正職一列、幹部一列 */
  .ps-divider{flex-basis:100%;width:auto;height:0;background:transparent;margin:1px 0}
  /* 考核結果：獨佔一列，通過/不通過 均分 */
  .field:has(.pass-seg){flex-basis:100%;min-width:100%}
  .pass-seg{display:flex;width:100%}
  .pass-seg button{flex:1;padding:10px 0}
}
</style>
</head>
<body>

<button class="back-btn" onclick="location.href='home.html'" title="返回主頁">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
</button>

<div class="wrap">
  <div class="hero">
    <h1>📊 考核紀錄</h1>
    <p class="subtitle">員工可查看全店紀錄；主管編輯需店長密碼</p>
  </div>

  <div class="store-row" id="storeRow"></div>

  <div class="month-row">
    <button class="mbtn" onclick="shiftMonth(-1)">◀</button>
    <span class="mlabel" id="monthLabel"></span>
    <button class="mbtn" onclick="shiftMonth(1)">▶</button>
  </div>

  <details class="rules">
    <summary>🏅 職務加給表（考核說明） <span class="arr">▼</span></summary>
    <div class="rules-body">
      <ol>
        <li>每月考核 乙 站，每 3 站調薪 乙 次。</li>
        <li>正職 1 站 + 500 元</li>
        <li>幹部以上考核，每 2 站調薪 乙 次。</li>
      </ol>
      <p style="font-size:12px;color:var(--ink-2)">※ 每人每月有 3 次失誤機會，失誤累計達 3 次當月考核不通過；當月有遲到不可考核。<br>※ 選擇考核站後，檢查細項會直接顯示在該員工的考核項目中。</p>
    </div>
  </details>

  <div class="hint-banner" id="urlBanner">⚙️ 尚未設定雲端網址，目前資料只存在這台裝置。請主管點右方「⚙️ 設定」貼上 GAS 網址。</div>

  <div class="toolbar">
    <button class="tbtn" id="editBtn" onclick="toggleEdit()">🔒 主管編輯</button>
    <button class="tbtn" id="addEmpBtn" onclick="addEmployee()" style="display:none">➕ 新增員工</button>
    <span class="spacer"></span>
    <button class="sync-chip idle" id="syncBtn" onclick="onSyncClick()">☁️ 已同步</button>
    <button class="tbtn" onclick="openSettings()">⚙️</button>
  </div>

  <div class="emp-list" id="empList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================
// 設定
// ============================================
// 部署 考核紀錄-script.gs 後，把 /exec 網址貼到下面（或由 ⚙️ 設定輸入）
var BUILTIN_REVIEW_SYNC_URL = "https://script.google.com/macros/s/AKfycbwhMQQqBW67DQ-xOQdJIew5u1y6sNWad9GtsNXPcBvZKUmnx70RvKiakKuYjAYl47GX/exec";

var STORES = [
  { key: 'chudian-zhonghe',    name: '中和店', brand: '初殿' },
  { key: 'chudian-yongchun',   name: '永春店', brand: '初殿' },

function ensureSeed(){
  var d = storeData();
  if(d.employees.length > 0) return;
  var defs = DEFAULT_EMPLOYEES[curStore];
  if(!defs) return;
  d.employees = defs.map(function(e){
    return { id: 'n-' + e.n, name: e.n, level: 'staff', active: true, passed: (e.p || []).slice() };
  });
  var dr = DEFAULT_RECORDS[curStore];
  if(dr) Object.keys(dr).forEach(function(m){
    if(!d.records[m]) d.records[m] = {};
    Object.keys(dr[m]).forEach(function(id){
      if(!d.records[m][id]) d.records[m][id] = JSON.parse(JSON.stringify(dr[m][id]));
    });
  });
  saveLocal();
}

// 已通過站別 ＝ 歷史基準(emp.passed) ∪ 各月考核通過的站
function passedSetUpTo(emp, month){
  var set = {};
  (emp.passed || []).forEach(function(s){ set[s] = 1; });
  var d = storeData();
  Object.keys(d.records || {}).forEach(function(m){
    if(month && m > month) return;
    var r = d.records[m] && d.records[m][emp.id];
    if(r && r.station && statusOf(r).code === 'pass') set[r.station] = 1;
  });
  return set;
}
function passedStations(emp){
  var set = passedSetUpTo(emp, null);
  return STATIONS.staff.concat(STATIONS.cadre).filter(function(s){ return set[s]; });
}
function nextMonthLabel(month){
  var p = month.split('-');
  var d = new Date(Number(p[0]), Number(p[1]), 1);  // 下個月1號
  return (d.getMonth() + 1) + '月';
}

function editState(){
  if(sessionStorage.getItem('cd_review_edit_global') === '1') return 'global';
  if(sessionStorage.getItem('cd_review_edit_' + curStore) === '1') return 'store';
  return '';
}

function currentMonth(){
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function syncUrl(){
  if(BUILTIN_REVIEW_SYNC_URL && !localStorage.getItem('cd_review_sync_url')){
    localStorage.setItem('cd_review_sync_url', BUILTIN_REVIEW_SYNC_URL);
  }
  return localStorage.getItem('cd_review_sync_url') || '';
}
function storeData(){
  if(!DATA[curStore]) DATA[curStore] = { employees: [], records: {} };
  var d = DATA[curStore];
  if(!d.employees) d.employees = [];
  if(!d.records) d.records = {};
  return d;
}
function rec(empId){
  var d = storeData();
  if(!d.records[curMonth]) d.records[curMonth] = {};
  if(!d.records[curMonth][empId]) d.records[curMonth][empId] = { station:'', late:false, pass:'', mistakes:[], checks:[] };
  var r = d.records[curMonth][empId];
  if(!r.mistakes) r.mistakes = [];
  if(!r.checks) r.checks = [];
  return r;
}

// 自動判定狀態：遲到→鎖定；失誤滿3→不通過；否則看主管勾選
function statusOf(r){
  if(!r) return { code:'none', label:'未考核' };
  if(r.late) return { code:'locked', label:'⏰ 遲到不可考核' };
  if((r.mistakes||[]).length >= MAX_MISTAKES) return { code:'fail', label:'✕ 不通過（失誤滿3次）' };
  if(r.pass === 'pass') return { code:'pass', label:'✓ 通過' };
  if(r.pass === 'fail') return { code:'fail', label:'✕ 不通過' };
  return { code:'none', label:'未考核' };
}

function renderEmp(emp){
  var r = rec(emp.id);
  var st = statusOf(r);
  var passed = passedStations(emp);
  var cum = passed.length;
  var total = ALL_STATIONS.length;

  var card = document.createElement('div');
  card.className = 'emp-card';

  // ---- 頭 ----
  var head = document.createElement('div');
  head.className = 'emp-head';
  head.innerHTML =
    '<span class="emp-name">' + esc(emp.name) + '</span>' +
    '<span class="lv-chip ' + emp.level + '">' + (emp.level === 'cadre' ? '幹部' : '正職') + '</span>' +
    '<span class="cum-chip">已通過 ' + cum + ' / ' + total + ' 站' + (cum === total ? '｜🏆 全站完成' : '') + '</span>' +
    '<span class="status-chip ' + st.code + '">' + st.label + '</span>';
  card.appendChild(head);

  // ---- 迷你徽章：10 站一排，綠＝已過、灰＝未過（編輯模式點徽章補登/取消） ----
  var ps = document.createElement('div');
  ps.className = 'ps-row';
  ALL_STATIONS.forEach(function(s, i){
    if(i === STATIONS.staff.length){
      var div = document.createElement('span');
      div.className = 'ps-divider';
      ps.appendChild(div);
    }
    var on = passed.indexOf(s) !== -1;
    var isCadre = i >= STATIONS.staff.length;
    var b = document.createElement('span');
    b.className = 'mini-badge ' + (isCadre ? 'g-cadre' : 'g-staff') + (on ? ' on' : '') + (EDITING ? ' clickable' : '');
    b.textContent = SHORT_NAMES[s] || s.charAt(0);
    b.title = s + (on ? '｜✓ 已通過' : '｜未通過') + (EDITING ? '（點一下切換）' : '');
    if(EDITING){
      b.onclick = function(){
        if(!emp.passed) emp.passed = [];
        var idx = emp.passed.indexOf(s);
        if(idx === -1) emp.passed.push(s);
        else emp.passed.splice(idx, 1);
        markDirty(); render();
      };
    }
    ps.appendChild(b);
  });
  card.appendChild(ps);

  // ---- 調薪提示：本月通過讓正職站數達3倍數→下月調1500；幹部站達2倍數→下月調1000 ----
  if(st.code === 'pass' && r.station){
    var upTo = passedSetUpTo(emp, curMonth);
    var isStaffSt = STATIONS.staff.indexOf(r.station) !== -1;
    var group = isStaffSt ? STATIONS.staff : STATIONS.cadre;
    var rule = isStaffSt ? RAISE_RULES.staffStation : RAISE_RULES.cadreStation;
    var n = group.filter(function(s){ return upTo[s]; }).length;
    if(n > 0 && n % rule.every === 0){
      var rb = document.createElement('div');
      rb.className = 'raise-banner';
      rb.textContent = '🎉 達調薪門檻，' + nextMonthLabel(curMonth) + '調薪 ' + rule.amount + ' 元';
      card.appendChild(rb);
    }
  }

  // ---- 本月考核 ----
  var body = document.createElement('div');
  body.className = 'emp-body';

  // 考核站
  var f1 = document.createElement('div');
  f1.className = 'field';
  f1.innerHTML = '<span class="flabel">本月考核站</span>';
  var sel = document.createElement('select');
  sel.className = 'fsel';
  sel.disabled = !EDITING;
  function optHtml(s){
    return '<option value="' + esc(s) + '"' + (r.station === s ? ' selected' : '') + '>' + esc(s) + '</option>';
  }
  sel.innerHTML = '<option value="">— 未選 —</option>' +
    '<optgroup label="正職站">' + STATIONS.staff.map(optHtml).join('') + '</optgroup>' +
    '<optgroup label="幹部站">' + STATIONS.cadre.map(optHtml).join('') + '</optgroup>';
  sel.onchange = function(){
    if(r.station !== sel.value) r.checks = [];   // 換站別清空檢查勾選
    r.station = sel.value;
    markDirty(); render();
  };
  f1.appendChild(sel);
  body.appendChild(f1);

  // 遲到
  var f2 = document.createElement('div');
  f2.className = 'field';
  f2.innerHTML = '<span class="flabel">當月遲到</span>';
  var lt = document.createElement('label');
  lt.className = 'late-toggle' + (r.late ? ' on' : '');
  var cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = !!r.late;
  cb.disabled = !EDITING;
  cb.onchange = function(){
    r.late = cb.checked;
    if(r.late) r.pass = '';
    markDirty(); render();
  };
  lt.appendChild(cb);
  lt.appendChild(document.createTextNode('本月有遲到'));
  f2.appendChild(lt);
  body.appendChild(f2);

  // 通過/不通過
  var f3 = document.createElement('div');
  f3.className = 'field';
  f3.innerHTML = '<span class="flabel">考核結果</span>';
  var seg = document.createElement('div');

  bPass.disabled = !canJudge;
  if(st.code === 'pass') bPass.className = 'on-pass';

  var bFail = document.createElement('button');

  body.appendChild(f3);

  card.appendChild(body);

      });

  // ---- 失誤紀錄 ----

  mhead.className = 'mk-head';
  var n = (r.mistakes||[]).length;
  mhead.innerHTML = '<span class="mk-title">失誤紀錄</span><span class="mk-count' + (n >= MAX_MISTAKES ? ' full' : '') + '">' + n + ' / ' + MAX_MISTAKES + '</span>';
  if(EDITING){
    var addB = document.createElement('button');
    addB.className = 'mk-add';
    addB.textContent = '＋ 登記失誤';
    addB.disabled = n >= MAX_MISTAKES;
    addB.onclick = function(){
      r.mistakes.push({ d: new Date().toISOString().slice(0,10), r: '' });
      if(r.mistakes.length >= MAX_MISTAKES) r.pass = '';
      markDirty(); render();
    };
    mhead.appendChild(addB);
  }
  mk.appendChild(mhead);

  if(n === 0){
    var me = document.createElement('div');
    me.className = 'mk-empty';
    me.textContent = '本月無失誤';
    mk.appendChild(me);
  } else {
    r.mistakes.forEach(function(m, i){
      var row = document.createElement('div');
      row.className = 'mk-row';
      var di = document.createElement('input');
      di.type = 'date'; di.value = m.d || ''; di.disabled = !EDITING;
      di.onchange = function(){ m.d = di.value; markDirty(); };
      var ri = document.createElement('input');
      ri.className = 'mk-reason'; ri.placeholder = '失誤原因…'; ri.value = m.r || ''; ri.disabled = !EDITING;
      ri.oninput = function(){ m.r = ri.value; markDirty(); };
      row.appendChild(di); row.appendChild(ri);
      if(EDITING){
        var del = document.createElement('button');
        del.className = 'mk-del'; del.textContent = '🗑'; del.title = '刪除這筆失誤';
        del.onclick = function(){
          if(!confirm('刪除這筆失誤紀錄？')) return;
          r.mistakes.splice(i,1); markDirty(); render();
        };
        row.appendChild(del);
      }
      mk.appendChild(row);
    });
  }
  card.appendChild(mk);

  // ---- 移除員工 ----
  if(EDITING){
    var foot = document.createElement('div');
    foot.className = 'emp-foot';
    var rm = document.createElement('button');
    rm.className = 'emp-remove';
    rm.textContent = '移除此員工（保留歷史紀錄）';
    rm.onclick = function(){
      if(!confirm('將「' + emp.name + '」從考核名單移除？\n歷史紀錄會保留，之後可請工程師恢復。')) return;
      emp.active = false; markDirty(); render();
    };
    foot.appendChild(rm);
    card.appendChild(foot);
  }

  return card;
}

function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}

// ============================================
// 操作
// ============================================
function switchStore(key){
  if(DIRTY && EDITING && !confirm('有未儲存的變更，切換門市將不會上傳，確定？')) return;
  curStore = key;
  loadLocal();
  render();                                   // 先用本機快取立刻顯示
  SYNCING = true; refreshSyncBtn();
  pullFromCloud(true).finally(function(){ SYNCING = false; render(); });
}

function shiftMonth(delta){
  var p = curMonth.split('-');
  var d = new Date(Number(p[0]), Number(p[1]) - 1 + delta, 1);
  curMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  render();
}

function toggleEdit(){
  if(editState()){
    sessionStorage.removeItem('cd_review_edit_global');
    sessionStorage.removeItem('cd_review_edit_' + curStore);
    render();
    return;
  }
  var s = STORES.find(function(x){ return x.key === curStore; });
  var input = prompt('【' + s.name + '】輸入店長密碼或全域密碼：');
  if(input === null) return;
  input = String(input).trim();
  if(input === GLOBAL_EDIT_PASSWORD){
    sessionStorage.setItem('cd_review_edit_global', '1');   // 全域：四店都能編＋管理細項
  } else if(input === EDIT_PASSWORDS[curStore]){
    sessionStorage.setItem('cd_review_edit_' + curStore, '1');
  } else {
    alert('❌ 密碼錯誤');
    return;
  }
  render();
}

function addEmployee(){
  var name = prompt('員工姓名：');
  if(!name || !name.trim()) return;
  var lv = prompt('職級？輸入 1=正職、2=幹部', '1');
  if(lv === null) return;
  var level = (String(lv).trim() === '2') ? 'cadre' : 'staff';
  storeData().employees.push({
    id: 'e' + Date.now() + Math.floor(Math.random()*1000),
    name: name.trim(),
    level: level,
    active: true,
    passed: []
  });
  markDirty(); render();
}

// ============================================
// 本機快取 + 雲端同步
// ============================================
function cacheKey(){ return 'cd_review_data_' + curStore; }
function saveLocal(){
  try{ localStorage.setItem(cacheKey(), JSON.stringify(storeData())); }catch(e){}
}
function loadLocal(){
  try{
    var raw = localStorage.getItem(cacheKey());
    if(raw) DATA[curStore] = JSON.parse(raw);
  }catch(e){}
}

function markDirty(){ DIRTY = true; saveLocal(); refreshSyncBtn(); }
function markClean(){ DIRTY = false; saveLocal(); refreshSyncBtn(); }

function refreshSyncBtn(){
  var btn = document.getElementById('syncBtn');
  if(!syncUrl()){ btn.className = 'sync-chip err'; btn.textContent = '⚙️ 未設定雲端'; return; }
  if(SYNCING){ btn.className = 'sync-chip saving'; btn.textContent = '⏳ 同步中…'; return; }
  if(DIRTY){ btn.className = 'sync-chip dirty'; btn.textContent = '⚠️ 有變更 — 點此上傳'; }
  else { btn.className = 'sync-chip idle'; btn.textContent = '☁️ 已同步'; }
}

function callGAS(action, payload){
  var url = syncUrl();
  if(!url) return Promise.reject(new Error('尚未設定雲端網址'));
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(Object.assign({ action: action }, payload || {}))
  }).then(function(r){ return r.json(); });
}

function onSyncClick(){
  if(!syncUrl()){ openSettings(); return; }
  pushToCloud();
}

function pushToCloud(){
  var btn = document.getElementById('syncBtn');
  btn.className = 'sync-chip saving'; btn.textContent = '⏳ 上傳中…';
  callGAS('saveStore', { store: curStore, data: storeData() }).then(function(res){
    if(res && res.ok){ markClean(); showToast('✅ 已存到雲端', 'ok'); }
    else throw new Error((res && res.error) || '雲端回應錯誤');
  }).catch(function(err){
    refreshSyncBtn();
    alert('❌ 上傳失敗：' + err.message + '\n\n資料仍保留在本機，可稍後再試。');
  });
}

function pullFromCloud(silent){
  loadLocal();
  if(!syncUrl()) return Promise.resolve();
  return callGAS('getStore', { store: curStore }).then(function(res){
    if(!res || !res.ok) throw new Error((res && res.error) || '雲端回應錯誤');
    var cloudEmpty = !res.data || !res.data.employees || res.data.employees.length === 0;
    if(res.data && !cloudEmpty){ DATA[curStore] = res.data; saveLocal(); }
    DIRTY = false;
    // 雲端還沒有這家店的名單 → 用內建名單自動補上傳一次，試算表才有資料
    if(cloudEmpty){
      DATA[curStore] = { employees: [], records: {} };
      ensureSeed();
      if(storeData().employees.length > 0){
        return callGAS('saveStore', { store: curStore, data: storeData() }).then(function(res2){
          if(res2 && res2.ok){ DIRTY = false; if(!silent) showToast('✅ 已將內建名單同步到雲端', 'ok'); }
        });
      }
    }
  }).catch(function(err){
    if(!silent) showToast('讀取雲端失敗：' + err.message, 'err');
  });
}

// ---- 檢查細項設定：雲端共用（全域密碼才能改） ----
function pullConfig(){
  if(!syncUrl()) return Promise.resolve();
  return callGAS('getConfig', {}).then(function(res){
    if(res && res.ok && res.config && res.config.checklists){
      CHECKLISTS = res.config.checklists;
    }
  }).catch(function(){ /* 讀不到就用內建預設 */ });
}

function pushConfig(){
  if(!syncUrl()){ showToast('尚未設定雲端網址，細項只改在本機', 'err'); return Promise.resolve(); }
  return callGAS('saveConfig', { config: { checklists: CHECKLISTS } }).then(function(res){
    if(res && res.ok) showToast('✅ 檢查細項已同步到雲端', 'ok');
    else throw new Error((res && res.error) || '雲端回應錯誤');
  }).catch(function(err){
    showToast('細項同步失敗：' + err.message, 'err');
  });
}

function addCheckItem(station, groupIdx){
  var txt = prompt('【' + station + '】新增檢查項目：');
  if(!txt || !txt.trim()) return;
  if(!CHECKLISTS[station]) CHECKLISTS[station] = { groups: [{ title: '', items: [] }] };
  CHECKLISTS[station].groups[groupIdx || 0].items.push(txt.trim());
  render();
  pushConfig();
}

function removeCheckItem(station, groupIdx, itemText){
  if(!confirm('刪除檢查項目：\n「' + itemText + '」？\n（不影響已勾過的歷史紀錄）')) return;
  var g = CHECKLISTS[station].groups[groupIdx];
  var i = g.items.indexOf(itemText);
  if(i !== -1) g.items.splice(i, 1);
  render();
  pushConfig();
}

function openSettings(){
  var cur = localStorage.getItem('cd_review_sync_url') || '';
  var v = prompt('考核紀錄 GAS 雲端網址（/exec 結尾）：', cur);
  if(v === null) return;
  v = v.trim();
  if(v) localStorage.setItem('cd_review_sync_url', v);
  else localStorage.removeItem('cd_review_sync_url');
  pullFromCloud().finally(render);
}

var toastTimer = null;
function showToast(msg, kind){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (kind || 'ok') + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.className = 'toast'; }, 2200);
}

// ============================================
// 啟動
// ============================================
render();
pullConfig().finally(function(){ if(curStore) render(); });
</script>
