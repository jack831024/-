<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FBF1DC">
<title>初殿鍋物 — 店內 SOP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
:root {
  --bg: #FBF1DC;
  --bg-deep: #F5E5C4;
  --bg-warm: #FFEBC8;
  --surface: #FFFDF8;
  --surface-soft: #FFF7E8;
  --border: rgba(120, 70, 30, 0.10);
  --border-strong: rgba(120, 70, 30, 0.20);
  --text: #3D2410;
  --text-muted: #7A5C3E;
  --text-soft: #B89B7A;
  --brand: #D14545;
  --brand-deep: #B91C1C;
  --brand-soft: #FEE2E2;
  --accent: #E8932B;
  --accent-deep: #C26A0E;
  --accent-soft: #FEF3C7;
  --warn: #C26A0E;
  --warn-soft: #FFEBC8;
  --danger: #B91C1C;
  --danger-soft: #FEE2E2;
  --success: #4D7C0F;
  --success-soft: #ECFCCB;
  --info: #0369A1;
  --info-soft: #DCEEFB;
  --radius: 18px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --shadow-card: 0 1px 2px rgba(120,70,30,0.06), 0 4px 14px rgba(120,70,30,0.06);
  --shadow-pop: 0 6px 22px rgba(120,70,30,0.14);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; overscroll-behavior-y: contain; }
body {
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 0% 0%, rgba(232,147,43,0.08) 0%, transparent 40%),
    radial-gradient(circle at 100% 100%, rgba(209,69,69,0.06) 0%, transparent 40%);
  background-attachment: fixed;
  color: var(--text);
  font-size: 16px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.01em;
  padding-bottom: env(safe-area-inset-bottom);
}
.app {
  max-width: 600px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 40px;
  position: relative;
}

/* ============ HEADER ============ */
header {
  padding: 22px 18px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo {
  width: 48px; height: 48px;
  border-radius: 16px;
  background: linear-gradient(135deg, #FFB347 0%, #D14545 100%);
  color: #FFF;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
  box-shadow: 0 6px 16px rgba(209,69,69,0.30);
}
.brand-meta { flex: 1; min-width: 0; }
.brand-title { font-size: 17px; font-weight: 700; line-height: 1.25; }
.brand-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.crumb-back {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  height: 44px;
  padding: 0 16px 0 12px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
  flex-shrink: 0;
}
.crumb-back i { font-size: 20px; }
.crumb-back:active { background: var(--bg-warm); transform: scale(0.97); }

/* ============ SEARCH ============ */
.search-bar {
  margin: 0 18px 12px;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  height: 56px;
  box-shadow: var(--shadow-card);
  transition: all 0.15s;
}
.search-bar:focus-within {
  border-color: var(--brand);
  box-shadow: 0 0 0 5px rgba(209,69,69,0.10), var(--shadow-card);
}
.search-emoji { font-size: 22px; margin-right: 10px; line-height: 1; }
#searchInput {
  flex: 1;
  border: none;
  background: transparent;
  outline: none;
  font-size: 16px;
  color: var(--text);
  font-family: inherit;
  font-weight: 500;
  min-width: 0;
}
#searchInput::placeholder { color: var(--text-soft); font-weight: 400; }
.search-clear {
  cursor: pointer;
  color: var(--text-soft);
  padding: 6px;
  border-radius: 999px;
  display: none;
  font-size: 20px;
  background: var(--bg-warm);
  width: 28px; height: 28px;
  align-items: center; justify-content: center;
}
.search-clear.show { display: flex; }

/* ============ SECTION LABEL ============ */
.section-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  padding: 22px 18px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label-emoji { font-size: 18px; line-height: 1; }

/* ============ QUICK CHIPS ============ */
.chips {
  padding: 0 14px 4px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 999px;
  padding: 10px 16px 10px 14px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: var(--shadow-card);
}
.chip:active { transform: scale(0.96); background: var(--bg-warm); }
.chip-emoji { font-size: 18px; line-height: 1; }

/* ============ CATEGORY TILES ============ */
.tiles {
  padding: 4px 14px 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.tile {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px 16px 18px;
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-card);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
  text-align: left;
  font-family: inherit;
}
.tile::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
}
.tile[data-key="kitchen"]::before { background: linear-gradient(90deg, #F59E0B, #FBBF24); }
.tile[data-key="floor"]::before { background: linear-gradient(90deg, #D14545, #F87171); }
.tile[data-key="complaint"]::before { background: linear-gradient(90deg, #EC4899, #F9A8D4); }
.tile[data-key="pos"]::before { background: linear-gradient(90deg, #3B82F6, #60A5FA); }
.tile:active { transform: scale(0.97); box-shadow: var(--shadow-pop); }
.tile-emoji {
  font-size: 36px;
  line-height: 1;
  margin-bottom: 12px;
  display: block;
}
.tile-title { font-size: 16px; font-weight: 700; }
.tile-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; font-weight: 400; }
.tile-count {
  font-size: 11px;
  color: var(--text-soft);
  margin-top: 10px;
  font-weight: 500;
}

/* ============ INSIDE CATEGORY: HERO ============ */
.cat-hero {
  margin: 6px 14px 14px;
  padding: 22px 20px;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-card);
  display: flex;
  align-items: center;
  gap: 16px;
  position: relative;
  overflow: hidden;
}
.cat-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
}
.cat-hero[data-key="kitchen"]::before { background: linear-gradient(90deg, #F59E0B, #FBBF24); }
.cat-hero[data-key="floor"]::before { background: linear-gradient(90deg, #D14545, #F87171); }
.cat-hero[data-key="complaint"]::before { background: linear-gradient(90deg, #EC4899, #F9A8D4); }
.cat-hero[data-key="pos"]::before { background: linear-gradient(90deg, #3B82F6, #60A5FA); }
.cat-hero-emoji { font-size: 44px; line-height: 1; flex-shrink: 0; }
.cat-hero-title { font-size: 22px; font-weight: 700; line-height: 1.2; }
.cat-hero-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; line-height: 1.55; }

/* ============ SECTIONS ============ */
.sections-list { padding: 0 14px; }
.section-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-card);
  transition: border-color 0.15s;
}
.section-card[data-priority="danger"] { border-color: rgba(185,28,28,0.30); }
.section-head {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 18px;
  cursor: pointer;
  user-select: none;
  min-height: 64px;
}
.section-head:active { background: var(--bg-warm); }
.section-emoji {
  font-size: 28px;
  line-height: 1;
  flex-shrink: 0;
  width: 44px;
  text-align: center;
}
.section-info { flex: 1; min-width: 0; }
.section-title { font-size: 15.5px; font-weight: 700; line-height: 1.4; }
.section-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }
.section-chev { color: var(--text-soft); font-size: 24px; transition: transform 0.25s; }
.section-card.open .section-chev { transform: rotate(90deg); color: var(--brand); }
.section-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease-out;
}
.section-card.open .section-body { max-height: 8000px; }
.section-body-inner { padding: 4px 18px 20px; border-top: 1px dashed var(--border); margin-top: 4px; }

/* ============ FLOW STEPS ============ */
.flow-step {
  position: relative;
  display: flex;
  gap: 14px;
  padding: 10px 0;
}
.flow-step:not(:last-child)::before {
  content: '';
  position: absolute;
  left: 17px;
  top: 38px;
  bottom: -4px;
  width: 2.5px;
  background: var(--brand-soft);
  border-radius: 2px;
}
.step-num {
  width: 34px; height: 34px;
  border-radius: 999px;
  background: linear-gradient(135deg, #F87171 0%, #D14545 100%);
  color: #FFF;
  font-size: 15px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  z-index: 1;
  box-shadow: 0 4px 12px rgba(209,69,69,0.30);
}
.step-content {
  flex: 1; min-width: 0;
  padding-top: 4px;
  font-size: 15.5px;
  line-height: 1.7;
  color: var(--text);
  font-weight: 500;
}
.step-pre {
  display: inline-block;
  background: var(--brand-soft);
  color: var(--brand-deep);
  font-size: 12px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 999px;
  margin-right: 8px;
  vertical-align: 2px;
}
.step-sub {
  margin-top: 10px;
  padding: 12px 14px;
  background: var(--bg-warm);
  border-radius: var(--radius-sm);
  font-size: 14px;
  line-height: 1.75;
  color: var(--text-muted);
  font-weight: 400;
}
.step-sub div { padding: 3px 0; padding-left: 18px; position: relative; }
.step-sub div::before {
  content: '◆';
  position: absolute;
  left: 4px;
  top: 3px;
  color: var(--accent);
  font-size: 10px;
}

/* ============ ENTRY ============ */
.entry {
  padding: 14px 0;
  border-bottom: 1.5px dashed var(--border);
}
.entry:last-child { border-bottom: none; padding-bottom: 4px; }
.entry-label {
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
  margin-bottom: 4px;
}
.entry-value {
  color: var(--text-muted);
  font-size: 14.5px;
  white-space: pre-line;
  line-height: 1.7;
  font-weight: 400;
}
.entry-sub {
  margin-top: 10px;
  padding: 12px 14px;
  background: var(--bg-warm);
  border-radius: var(--radius-sm);
  font-size: 14px;
  line-height: 1.75;
  color: var(--text-muted);
}
.entry-sub div { padding: 3px 0; padding-left: 18px; position: relative; }
.entry-sub div::before {
  content: '◆';
  position: absolute;
  left: 4px;
  top: 3px;
  color: var(--accent);
  font-size: 10px;
}

/* ============ CALLOUTS ============ */
.callout {
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  margin: 12px 0;
  line-height: 1.65;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-weight: 500;
}
.callout-emoji { font-size: 20px; flex-shrink: 0; line-height: 1.3; }
.callout.warn { background: var(--warn-soft); color: var(--warn); border: 1px solid rgba(194,106,14,0.20); }
.callout.danger { background: var(--danger-soft); color: var(--danger); border: 1px solid rgba(185,28,28,0.20); }
.callout.info { background: var(--info-soft); color: var(--info); border: 1px solid rgba(3,105,161,0.15); }

/* ============ EMPTY ============ */
.empty {
  text-align: center;
  padding: 70px 20px;
  color: var(--text-soft);
}
.empty-emoji { font-size: 64px; display: block; margin-bottom: 16px; }
.empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.empty-sub { font-size: 14px; }

/* ============ MARK ============ */
mark {
  background: linear-gradient(180deg, transparent 60%, #FDE68A 60%);
  color: var(--text);
  padding: 0 2px;
  font-weight: 600;
}

/* ============ FOOTER HINT ============ */
.foot-hint {
  margin: 30px 14px 0;
  padding: 16px 18px;
  background: var(--surface-soft);
  border-radius: var(--radius-md);
  border: 1px dashed var(--border-strong);
  font-size: 12.5px;
  line-height: 1.7;
  color: var(--text-muted);
}
.foot-hint-title { font-weight: 700; color: var(--text); margin-bottom: 4px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
.foot-hint code { background: var(--bg-warm); padding: 1px 6px; border-radius: 4px; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 12px; color: var(--brand-deep); }

/* ============ MOBILE OPTIMIZATIONS ============ */
@media (max-width: 480px) {
  body { font-size: 16px; }
  header { padding: 18px 14px 10px; }
  .logo { width: 44px; height: 44px; font-size: 22px; border-radius: 14px; }
  .brand-title { font-size: 16px; }
  .search-bar { margin: 0 14px 10px; height: 52px; padding: 0 16px; }
  .search-emoji { font-size: 20px; }
  #searchInput { font-size: 16px; }
  .section-label { padding: 18px 14px 10px; }
  .chips { padding: 0 10px 4px; }
  .chip { padding: 9px 14px 9px 12px; font-size: 13.5px; }
  .tiles { padding: 4px 10px 0; gap: 10px; }
  .tile { padding: 18px 14px 16px; border-radius: 16px; }
  .tile-emoji { font-size: 32px; margin-bottom: 10px; }
  .tile-title { font-size: 15px; }
  .tile-sub { font-size: 11.5px; }
  .cat-hero { margin: 4px 10px 12px; padding: 18px 16px; gap: 14px; border-radius: 16px; }
  .cat-hero-emoji { font-size: 38px; }
  .cat-hero-title { font-size: 19px; }
  .sections-list { padding: 0 10px; }
  .section-card { border-radius: 16px; margin-bottom: 10px; }
  .section-head { padding: 16px 14px; gap: 12px; min-height: 60px; }
  .section-emoji { font-size: 26px; width: 40px; }
  .section-title { font-size: 15px; }
  .section-body-inner { padding: 4px 14px 16px; }
  .step-content { font-size: 15px; }
  .step-num { width: 32px; height: 32px; font-size: 14px; }
  .flow-step:not(:last-child)::before { left: 16px; top: 36px; }
  .foot-hint { margin: 24px 10px 0; padding: 14px 16px; }
}

/* ============ DESKTOP ============ */
@media (min-width: 720px) {
  body { font-size: 15px; }
  .tiles { grid-template-columns: repeat(4, 1fr); }
  .tile-emoji { font-size: 32px; }
}

/* ============ ADMIN MODE ============ */
.admin-badge {
  background: linear-gradient(135deg, #D14545, #F87171);
  color: #FFF;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 999px;
  margin-left: 6px;
}
.icon-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  padding: 0;
  margin-left: 4px;
}
.icon-btn:active { transform: scale(0.92); }
.icon-btn.danger { color: var(--danger); }
.section-actions {
  display: flex;
  gap: 4px;
  margin-left: 8px;
}
.item-actions {
  display: none;
  gap: 4px;
  margin-left: 8px;
}
.entry:hover .item-actions, .flow-step:hover .item-actions, .admin-mode .item-actions { display: flex; }
.admin-mode .item-actions { display: flex; }
.add-btn {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  background: var(--surface);
  border: 1.5px dashed var(--border-strong);
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  color: var(--brand);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.add-btn:active { background: var(--bg-warm); }

/* ============ MODAL ============ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(40, 25, 10, 0.55);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  max-width: 480px;
  width: 100%;
  max-height: 92vh;
  overflow: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.30);
  border: 1px solid var(--border);
}
.modal-head {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal-title { font-size: 17px; font-weight: 700; flex: 1; }
.modal-close {
  width: 32px; height: 32px;
  border-radius: 999px;
  border: none;
  background: var(--bg-warm);
  cursor: pointer;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit;
}
.modal-body { padding: 16px 20px; }
.modal-foot {
  padding: 14px 20px 18px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  border-top: 1px solid var(--border);
}
.field {
  margin-bottom: 14px;
}
.field-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.field-hint {
  font-size: 11px;
  color: var(--text-soft);
  margin-top: 4px;
}
.field input, .field textarea, .field select {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 14.5px;
  background: var(--surface);
  color: var(--text);
  outline: none;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--brand);
}
.field textarea { min-height: 100px; resize: vertical; line-height: 1.5; }
.btn {
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
}
.btn-primary {
  background: var(--brand);
  color: #FFF;
}
.btn-primary:active { background: var(--brand-deep); }
.btn-primary:disabled { opacity: 0.5; cursor: wait; }
.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border-color: var(--border);
}
.btn-secondary:active { background: var(--bg-warm); }
.btn-danger {
  background: var(--danger);
  color: #FFF;
}
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--surface);
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 13px;
  z-index: 200;
  box-shadow: 0 8px 24px rgba(0,0,0,0.20);
}
.toast.error { background: var(--danger); }
.toast.success { background: var(--success); }

/* ============ LOADING ============ */
.loading-state {
  padding: 80px 20px;
  text-align: center;
  color: var(--text-soft);
}
.loading-state .spinner {
  width: 36px;
  height: 36px;
  margin: 0 auto 14px;
  border: 3px solid var(--border);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.loading-text { font-size: 14px; }

// 啟動時若 URL 有 ?admin=1 → 進編輯模式
(function initAdmin() {
  try {
    const p = new URLSearchParams(location.search);
    if (p.get('admin') === '1') {
      // 等 DOM ready 後再 prompt
      setTimeout(promptForPin, 200);
    }
  } catch (e) {}
})();

function exitAdmin() {
  STATE.admin = false;
  STATE.pin = null;
  sessionStorage.removeItem('sop_pin');
  document.body.classList.remove('admin-mode');
  toast('已退出編輯模式', 'success');
  render();
}

function promptForPin() {
  if (STATE.pin) {
    runRPC('verifyAdminPin', STATE.pin, function(ok) {
      if (ok === true) {
        STATE.admin = true;
        document.body.classList.add('admin-mode');
        toast('已進入編輯模式', 'success');
        render();
      } else {
        sessionStorage.removeItem('sop_pin');
        STATE.pin = null;
        promptForPin();
      }
    });
    return;
  }
  showPrompt('管理員登入', {
    label: '請輸入管理員 PIN',
    placeholder: '管理員 PIN',
    password: true,
    okText: '進入編輯'
  }, function(pin) {
    if (!pin) return;
    runRPC('verifyAdminPin', pin, function(ok) {
      if (ok === true) {
        STATE.pin = pin;
        STATE.admin = true;
        sessionStorage.setItem('sop_pin', pin);
        document.body.classList.add('admin-mode');
        toast('已進入編輯模式', 'success');
        render();
      } else {
        toast('PIN 錯誤', 'error');
      }
    });
  });
}

// ============= RPC 包裝 =============
function apiCall(action, payload) {
  var args = (payload === undefined) ? [] : [payload];
  return fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: action, args: args }) })
    .then(function(r){ return r.json(); })
    .then(function(res){ if (res && res.ok) return res.data; throw new Error((res && res.error) || ('API error: ' + action)); });
}

function runRPC(fnName, payload, onSuccess) {
  apiCall(fnName, payload).then(function(data){ if (onSuccess) onSuccess(data); }).catch(function(err){ console.error(err); toast('伺服器錯誤：' + (err.message || err), 'error'); });
}

// ============= Toast =============
function toast(msg, type) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = el('div', { cls: 'toast' + (type ? ' ' + type : '') }, msg);
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2200);
}

// ============= Modal =============
function showModal(title, bodyEls, footerEls) {
  closeModal();
  const overlay = el('div', { cls: 'modal-overlay', onclick: function(e) { if (e.target === overlay) closeModal(); } });
  const modal = el('div', { cls: 'modal' });
  modal.appendChild(el('div', { cls: 'modal-head' }, [
    el('div', { cls: 'modal-title' }, title),
    el('button', { cls: 'modal-close', onclick: closeModal }, '✕')
  ]));
  modal.appendChild(el('div', { cls: 'modal-body' }, bodyEls));
  if (footerEls) modal.appendChild(el('div', { cls: 'modal-foot' }, footerEls));
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

function closeModal() {
  const m = document.querySelector('.modal-overlay');
  if (m) m.remove();
}

// ============= 自訂 Confirm / Prompt =============
function showConfirm(title, message, onConfirm, opts) {
  opts = opts || {};
  showModal(title, [
    el('div', { style: 'font-size: 15px; line-height: 1.65; color: var(--text); white-space: pre-line;' }, message || '')
  ], [
    el('button', { cls: 'btn btn-secondary', onclick: closeModal }, opts.cancelText || '取消'),
    el('button', { cls: 'btn ' + (opts.danger ? 'btn-danger' : 'btn-primary'), onclick: function() {
      closeModal();
      try { onConfirm(); } catch (e) { console.error(e); }
    } }, opts.okText || '確認')
  ]);
}

function showPrompt(title, opts, onSubmit) {
  opts = opts || {};
  const input = el('input', {
    type: opts.password ? 'password' : 'text',
    placeholder: opts.placeholder || '',
    value: opts.defaultValue || ''
  });
  function submit() {
    const v = input.value;
    closeModal();
    try { onSubmit(v); } catch (e) { console.error(e); }
  }
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') submit(); });
  showModal(title, [
    opts.label ? el('div', { style: 'font-size:14px; color:var(--text-muted); margin-bottom:10px;' }, opts.label) : null,
    el('div', { cls: 'field' }, [input])
  ], [
    el('button', { cls: 'btn btn-secondary', onclick: closeModal }, '取消'),
    el('button', { cls: 'btn btn-primary', onclick: submit }, opts.okText || '確認')
  ]);
  setTimeout(function() { input.focus(); }, 80);
}

// ============= 重新載入資料 =============
function reloadData() {
  apiCall('getSOPData').then(function(data){
    if (data && data.error) { toast('資料重載失敗：' + data.error, 'error'); return; }
    if (data && typeof data === 'object' && Object.keys(data).length > 0) {
      SOP_DATA = data;
      if (STATE.cat && STATE.openSection != null) {
        var sections = (SOP_DATA[STATE.cat] && SOP_DATA[STATE.cat].sections) || [];
        var stillExists = sections.some(function(s) { return Number(s._secNum) === Number(STATE.openSection); });
        if (!stillExists) STATE.openSection = null;
      }
      render();
    }
  }).catch(function(err){ toast('資料重載失敗：' + (err.message || err), 'error'); });
}

// ============= HELPERS =============
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'cls') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.substring(2), attrs[k]);
    else if (k === 'data') for (const dk in attrs[k]) e.setAttribute('data-' + dk, attrs[k][dk]);
    else e.setAttribute(k, attrs[k]);
  }
  if (children) (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null || c === false) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}

// XSS 防護：所有透過 innerHTML 插入的使用者輸入都必須先過 esc()
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function highlight(text, q) {
  if (text == null || text === '') return '';
  if (!q) return esc(text);
  const lc = String(text);
  const idx = lc.toLowerCase().indexOf(String(q).toLowerCase());
  if (idx < 0) return esc(text);
  return esc(lc.substring(0, idx)) + '<mark>' + esc(lc.substring(idx, idx + q.length)) + '</mark>' + esc(lc.substring(idx + q.length));
}

function matchesQuery(section, q) {
  if (!q) return true;
  return JSON.stringify(section).toLowerCase().includes(q.toLowerCase());
}

function goCat(cat, openSecNum) {
  STATE.route = 'cat';
  STATE.cat = cat;
  // openSecNum 是該章節在 Sheet 的「章節#」(_secNum)；null = 預設展開第一個
  STATE.openSection = (openSecNum != null && openSecNum !== '') ? Number(openSecNum) : null;
  STATE.query = '';
  const si = document.getElementById('searchInput');
  if (si) si.value = '';
  render();
}

function goHome() {
  STATE.route = 'home';
  STATE.cat = null;
  STATE.query = '';
  const si = document.getElementById('searchInput');
  if (si) si.value = '';
  render();
}

// ============= RENDER HEADER + SEARCH =============
function renderHeader() {
  const isInside = STATE.route === 'cat';
  return el('header', null, [
    isInside
      ? el('button', { cls: 'crumb-back', onclick: goHome }, [
          el('i', { cls: 'ti ti-chevron-left' }),
          el('span', null, '返回')
        ])
      : el('div', { cls: 'logo' }, '🍲'),
    el('div', { cls: 'brand-meta' }, [
      el('div', { cls: 'brand-title' }, [
        document.createTextNode(isInside ? '店內 SOP' : '初殿鍋物 SOP'),
        STATE.admin ? el('span', { cls: 'admin-badge' }, '✏️ 編輯模式') : null
      ])
    ]),
    STATE.admin
      ? el('div', { style: 'display: flex; gap: 4px; align-items: center;' }, [
          el('button', { cls: 'icon-btn', title: '回收桶', onclick: openTrashModal }, '♻️'),
          el('button', { cls: 'icon-btn', title: '修改 PIN', onclick: openChangePinModal }, '🔑'),
          el('button', { cls: 'icon-btn danger', title: '退出編輯', onclick: exitAdmin }, '🚪')
        ])
      : el('button', {
          cls: 'icon-btn',
          title: '管理員編輯',
          style: 'opacity: 0.55;',
          onclick: promptForPin
        }, '⚙️')
  ]);
}

function renderSearchBar() {
  return el('div', { cls: 'search-bar' }, [
    el('span', { cls: 'search-emoji' }, '🔍'),
    el('input', {
      type: 'text',
      id: 'searchInput',
      placeholder: '搜尋情境、湯底、步驟…',
      autocomplete: 'off',
      oninput: function(e) {
        STATE.query = e.target.value.trim();
        document.querySelector('.search-clear').classList.toggle('show', !!STATE.query);
        renderBody();
      }
    }),
    el('span', {
      cls: 'search-clear',
      onclick: function() {
        STATE.query = '';
        document.getElementById('searchInput').value = '';
        document.querySelector('.search-clear').classList.remove('show');
        renderBody();
      }
    }, [el('i', { cls: 'ti ti-x' })])
  ]);
}

// ============= RENDER HOME =============
function renderHome() {
  const body = el('div');

  body.appendChild(el('div', { cls: 'section-label' }, [
    el('span', { cls: 'section-label-emoji' }, '⚡'),
    el('span', null, '常見情境（一鍵跳）')
  ]));
  const chips = el('div', { cls: 'chips' });
  const scenarios = SOP_DATA._scenarios || [];
  scenarios.forEach(s => {
    const chipChildren = [
      el('span', { cls: 'chip-emoji' }, s.emoji || '✨'),
      document.createTextNode(s.text)
    ];
    if (STATE.admin) {
      chipChildren.push(el('span', {
        style: 'margin-left: 6px; color: var(--text-soft); font-size: 12px;',
        title: '編輯',
        onclick: function(e) {
          e.stopPropagation();
          openEditScenarioModal(s);
        }
      }, '✏️'));
      chipChildren.push(el('span', {
        style: 'margin-left: 2px; color: var(--danger); font-size: 12px;',
        title: '刪除',
        onclick: function(e) {
          e.stopPropagation();
          confirmDeleteScenario(s.id, s.text);
        }
      }, '🗑️'));
    }
    chips.appendChild(el('button', {
      cls: 'chip',
      onclick: function() { triggerScenario(s); }
    }, chipChildren));
  });
  if (STATE.admin) {
    chips.appendChild(el('button', {
      cls: 'chip',
      style: 'border-style: dashed; color: var(--brand);',
      onclick: openAddScenarioModal
    }, [
      el('span', { cls: 'chip-emoji' }, '➕'),
      document.createTextNode('新增情境')
    ]));
  }
  body.appendChild(chips);

  body.appendChild(el('div', { cls: 'section-label' }, [
    el('span', { cls: 'section-label-emoji' }, '📖'),
    el('span', null, '所有 SOP 分類')
  ]));
  const tiles = el('div', { cls: 'tiles' });
  // 明確按 _order 排序，避免 Object.keys 順序受 Apps Script 序列化影響
  const catKeys = Object.keys(SOP_DATA)
    .filter(function(k) { return k.charAt(0) !== '_'; })
    .sort(function(a, b) {
      const oa = (SOP_DATA[a] && SOP_DATA[a]._order != null) ? SOP_DATA[a]._order : 999;
      const ob = (SOP_DATA[b] && SOP_DATA[b]._order != null) ? SOP_DATA[b]._order : 999;
      return oa - ob;
    });
  catKeys.forEach(key => {
    const sop = SOP_DATA[key];
    tiles.appendChild(el('button', {
      cls: 'tile',
      data: { key },
      onclick: function() { goCat(key); }
    }, [
      el('span', { cls: 'tile-emoji' }, sop.emoji),
      el('div', { cls: 'tile-title' }, sop.title),
      el('div', { cls: 'tile-sub' }, sop.short),
      el('div', { cls: 'tile-count' }, sop.sections.length + ' 個章節')
    ]));
  });
  body.appendChild(tiles);

  if (STATE.query) {
    const results = [];
    const sortedKeys = Object.keys(SOP_DATA)
      .filter(function(k) { return k.charAt(0) !== '_'; })
      .sort(function(a, b) {
        const oa = (SOP_DATA[a] && SOP_DATA[a]._order != null) ? SOP_DATA[a]._order : 999;
        const ob = (SOP_DATA[b] && SOP_DATA[b]._order != null) ? SOP_DATA[b]._order : 999;
        return oa - ob;
      });
    sortedKeys.forEach(key => {
      (SOP_DATA[key].sections || []).forEach((s, idx) => {
        if (matchesQuery(s, STATE.query)) results.push({ cat: key, section: s, idx });
      });
    });
    body.appendChild(el('div', { cls: 'section-label' }, [
      el('span', { cls: 'section-label-emoji' }, '🔎'),
      el('span', null, '搜尋「' + STATE.query + '」（' + results.length + ' 項）')
    ]));
    if (results.length === 0) {
      body.appendChild(el('div', { cls: 'empty' }, [
        el('span', { cls: 'empty-emoji' }, '🤔'),
        el('div', { cls: 'empty-title' }, '找不到「' + STATE.query + '」'),
        el('div', { cls: 'empty-sub' }, '試試其他關鍵字')
      ]));
    } else {
      const list = el('div', { cls: 'sections-list' });
      results.forEach(r => {
        list.appendChild(el('div', {
          cls: 'section-card',
          onclick: function() { goCat(r.cat, r.section._secNum); }
        }, [
          el('div', { cls: 'section-head' }, [
            el('span', { cls: 'section-emoji' }, r.section.emoji || '📌'),
            el('div', { cls: 'section-info' }, [
              el('div', { cls: 'section-title', html: highlight(r.section.title, STATE.query) }),
              el('div', { cls: 'section-subtitle' }, SOP_DATA[r.cat].emoji + ' ' + SOP_DATA[r.cat].title)
            ]),
            el('i', { cls: 'ti ti-chevron-right section-chev' })
          ])
        ]));
      });
      body.appendChild(list);
    }
  } else {
    // 管理員提示已隱藏（避免干擾員工視覺）
  }

  return body;
}

// ============= RENDER CATEGORY =============
function renderCat() {
  const sop = SOP_DATA[STATE.cat];
  const wrap = el('div');
  const catKey = STATE.cat;

  wrap.appendChild(el('div', { cls: 'cat-hero', data: { key: catKey } }, [
    el('span', { cls: 'cat-hero-emoji' }, sop.emoji),
    el('div', null, [
      el('div', { cls: 'cat-hero-title' }, sop.title),
      el('div', { cls: 'cat-hero-sub' }, sop.note)
    ])
  ]));

  const list = el('div', { cls: 'sections-list' });
  const visibleSections = sop.sections.filter(s => matchesQuery(s, STATE.query));

  if (visibleSections.length === 0) {
    list.appendChild(el('div', { cls: 'empty' }, [
      el('span', { cls: 'empty-emoji' }, '🔍'),
      el('div', { cls: 'empty-title' }, '在「' + sop.title + '」找不到「' + STATE.query + '」')
    ]));
  } else {
    // 計算預設要展開哪個章節：使用者點過的優先，否則展開第一個
    const defaultOpenSecNum = (STATE.openSection != null)
      ? STATE.openSection
      : (visibleSections[0] && visibleSections[0]._secNum);

    visibleSections.forEach(sec => {
      const isOpen = !!STATE.query || sec._secNum === defaultOpenSecNum;
      const secNum = sec._secNum;
      const card = el('div', {
        cls: 'section-card' + (isOpen ? ' open' : ''),
        data: sec.priority ? { priority: sec.priority } : {}
      });

      // ----- Section head with admin controls -----
      const headChildren = [
        el('span', { cls: 'section-emoji' }, sec.emoji || '📌'),
        el('div', { cls: 'section-info' }, [
          el('div', { cls: 'section-title', html: highlight(sec.title, STATE.query) }),
          sec.subtitle ? el('div', { cls: 'section-subtitle', html: highlight(sec.subtitle, STATE.query) }) : null
        ])
      ];
      if (STATE.admin) {
        headChildren.push(el('div', { cls: 'section-actions' }, [
          el('button', { cls: 'icon-btn', title: '編輯章節', onclick: function(e) {
            e.stopPropagation();
            openEditSectionModal(catKey, secNum, sec.title, sec.emoji, sec.subtitle || '', sec.priority || '');
          } }, '✏️'),
          el('button', { cls: 'icon-btn danger', title: '刪除章節', onclick: function(e) {
            e.stopPropagation();
            confirmDeleteSection(catKey, secNum, sec.title);
          } }, '🗑️')
        ]));
      }
      headChildren.push(el('i', { cls: 'ti ti-chevron-right section-chev' }));
      card.appendChild(el('div', {
        cls: 'section-head',
        onclick: function() {
          card.classList.toggle('open');
          // 記住目前展開的章節，重新整理 / 編輯儲存後不會跑掉
          STATE.openSection = card.classList.contains('open') ? sec._secNum : null;
        }
      }, headChildren));

      const bodyEl = el('div', { cls: 'section-body' });
      const inner = el('div', { cls: 'section-body-inner' });

      // ----- Callout -----
      if (sec.callout) {
        const calloutEl = el('div', { cls: 'callout ' + sec.callout.type });
        calloutEl.appendChild(el('span', { cls: 'callout-emoji' }, sec.callout.emoji || 'ℹ️'));
        calloutEl.appendChild(el('div', { html: highlight(sec.callout.text, STATE.query) }));
        if (STATE.admin && sec.callout._itemNum) {
          calloutEl.appendChild(el('div', { cls: 'item-actions' }, [
            el('button', { cls: 'icon-btn', onclick: function() {
              openEditItemModal(catKey, secNum, sec.callout._itemNum, 'callout', sec.callout.type, sec.callout.emoji, sec.callout.text, '');
            } }, '✏️'),
            el('button', { cls: 'icon-btn danger', onclick: function() {
              confirmDeleteItem(catKey, secNum, sec.callout._itemNum);
            } }, '🗑️')
          ]));
        }
        inner.appendChild(calloutEl);
      }

      // ----- Flow -----
      if (sec.flow) {
        sec.flow.forEach((step, i) => {
          const stepEl = el('div', { cls: 'flow-step' });
          stepEl.appendChild(el('div', { cls: 'step-num' }, String(i + 1)));
          const content = el('div', { cls: 'step-content' });
          let html = '';
          if (step.pre) html += '<span class="step-pre">' + esc(step.pre) + '</span>';
          html += highlight(step.text, STATE.query);
          content.innerHTML = html;
          if (step.sub) {
            const sub = el('div', { cls: 'step-sub' });
            step.sub.forEach(s => sub.appendChild(el('div', { html: highlight(s, STATE.query) })));
            content.appendChild(sub);
          }
          stepEl.appendChild(content);
          if (STATE.admin) {
            const itemNum = step._itemNum;
            stepEl.appendChild(el('div', { cls: 'item-actions' }, [
              el('button', { cls: 'icon-btn', onclick: function() {
                openEditItemModal(catKey, secNum, itemNum, 'flow', step.pre || '', '', step.text, (step.sub || []).join('||'));
              } }, '✏️'),
              el('button', { cls: 'icon-btn danger', onclick: function() {
                confirmDeleteItem(catKey, secNum, itemNum);
              } }, '🗑️')
            ]));
          }
          inner.appendChild(stepEl);
        });
      }

      // ----- Items -----
      if (sec.items) {
        sec.items.forEach(it => {
          const entry = el('div', { cls: 'entry' });
          if (it.label) entry.appendChild(el('div', { cls: 'entry-label', html: highlight(it.label, STATE.query) }));
          if (it.value) entry.appendChild(el('div', { cls: 'entry-value', html: highlight(it.value, STATE.query) }));
          if (it.sub) {
            const sub = el('div', { cls: 'entry-sub' });
            it.sub.forEach(s => sub.appendChild(el('div', { html: highlight(s, STATE.query) })));
            entry.appendChild(sub);
          }
          if (STATE.admin) {
            const itemNum = it._itemNum;
            entry.appendChild(el('div', { cls: 'item-actions' }, [
              el('button', { cls: 'icon-btn', onclick: function() {
                openEditItemModal(catKey, secNum, itemNum, 'item', '', it.label, it.value, (it.sub || []).join('||'));
              } }, '✏️'),
              el('button', { cls: 'icon-btn danger', onclick: function() {
                confirmDeleteItem(catKey, secNum, itemNum);
              } }, '🗑️')
            ]));
          }
          inner.appendChild(entry);
        });
      }

      // ----- Add item button (admin only) -----
      if (STATE.admin) {
        inner.appendChild(el('button', {
          cls: 'add-btn',
          onclick: function() { openAddItemModal(catKey, secNum); }
        }, '➕ 新增項目'));
      }

      bodyEl.appendChild(inner);
      card.appendChild(bodyEl);
      list.appendChild(card);
    });
  }

  // ----- Add section button (admin only) -----
  if (STATE.admin) {
    list.appendChild(el('button', {
      cls: 'add-btn',
      onclick: function() { openAddSectionModal(catKey); }
    }, '➕ 新增章節'));
  }

  wrap.appendChild(list);
  return wrap;
}

// ============= ROUTER =============
function renderLoading() {
  return el('div', { cls: 'loading-state' }, [
    el('div', { cls: 'spinner' }),
    el('div', { cls: 'loading-text' }, '載入 SOP 中...')
  ]);
}

function renderBody() {
  let bodyEl = document.getElementById('appBody');
  if (!bodyEl) {
    bodyEl = el('div', { id: 'appBody' });
    document.getElementById('app').appendChild(bodyEl);
  }
  bodyEl.innerHTML = '';
  if (STATE.loading) {
    bodyEl.appendChild(renderLoading());
    return;
  }
  if (STATE.route === 'home') bodyEl.appendChild(renderHome());
  else bodyEl.appendChild(renderCat());
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(renderHeader());
  app.appendChild(renderSearchBar());
  renderBody();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
//  ★ 從 Apps Script API 載入最新 SOP（會覆蓋預設值）
//    自動偵測環境：
//    - Apps Script 直接 host → 用 google.script.run（最快、無 CORS）
//    - GitHub Pages 等外部 → 用 fetch(API_URL)
//    - 兩者都無 → 使用內建預設值
// ============================================================
function loadFromAPI() {
  var startTime = Date.now();
  apiCall('getSOPData').then(function(data){
    STATE.loading = false;
    if (data && typeof data === 'object' && !data.error && Object.keys(data).length > 0) {
      SOP_DATA = data;
      console.info('[SOP] 已從 API 載入 (' + (Date.now() - startTime) + 'ms)');
    } else {
      toast('資料載入失敗，使用內建預設值', 'error');
      console.warn('[SOP]', (data && data.error) || 'empty');
    }
    render();
  }).catch(function(err){
    STATE.loading = false;
    toast('資料載入失敗，使用內建預設值', 'error');
    console.warn('[SOP]', (err && err.message) || err);
    render();
  });
}

render();
loadFromAPI();
</script>
