<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>小行 · 行銷企劃 AI 顧問</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#e11d48;--rose-dark:#be123c;--rose-soft:#fecdd3;--rose-bg:#fff1f2;
  --gold:#d97706;--ink:#0f172a;--ink-2:#475569;--ink-3:#94a3b8;--ink-4:#cbd5e1;
  --line:#e2e8f0;--bg:#f8fafc;--green:#059669;--green-bg:#d1fae5;
  --blue:#2563eb;--blue-bg:#dbeafe;--amber:#d97706;--amber-bg:#fef3c7;
}
html,body{height:100%}
body{font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);min-height:100vh;padding:1.5rem 1.25rem 3rem;position:relative;overflow-x:hidden;
  background:radial-gradient(1200px 600px at 10% -10%, #ffe4e6 0%, transparent 50%),radial-gradient(900px 500px at 110% 10%, #fef3c7 0%, transparent 55%),radial-gradient(800px 600px at 50% 120%, #fce7f3 0%, transparent 60%),linear-gradient(180deg,#fff7f7 0%,#f8fafc 100%);}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 50%, transparent 0, rgba(255,255,255,0) 70%, rgba(15,23,42,0.04) 100%);}
.stage{max-width:1180px;margin:0 auto}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:10px;flex-wrap:wrap}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);border:1px solid rgba(15,23,42,.08);border-radius:999px;font-size:13px;color:var(--ink-2);text-decoration:none;cursor:pointer;font-family:inherit;transition:all .2s}
.back-btn:hover{background:#fff;color:var(--ink);transform:translateX(-2px)}
.actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.action-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:999px;border:1px solid rgba(15,23,42,.08);background:rgba(255,255,255,.7);backdrop-filter:blur(10px);font-size:12px;color:var(--ink-2);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.action-btn:hover{background:#fff;color:var(--ink)}
.action-btn.active{background:var(--rose);color:#fff;border-color:var(--rose);box-shadow:0 4px 14px -4px rgba(225,29,72,.5)}
.action-btn.danger:hover{background:#fef2f2;border-color:#fecaca;color:#b91c1c}
.save-status{font-size:11px;color:var(--green);min-width:90px;font-weight:500}
.brand-tag{display:flex;align-items:center;gap:8px;color:var(--ink-3);font-size:11px;letter-spacing:2px;font-weight:500;text-transform:uppercase}
.brand-tag .dot{width:6px;height:6px;border-radius:50%;background:var(--rose);box-shadow:0 0 12px var(--rose)}

/* EDIT BANNER */
.edit-banner{display:none;background:linear-gradient(90deg,#fef3c7 0%,#fef9c3 100%);border:1px solid #fde68a;border-radius:14px;padding:11px 16px;margin-bottom:1rem;font-size:12.5px;color:#854d0e;align-items:center;gap:10px;box-shadow:0 4px 12px -6px rgba(217,119,6,.2)}
.edit-banner .em{font-size:18px}
.edit-banner b{color:#713f12}
body.editing .edit-banner{display:flex}

/* HERO */
.hero{display:grid;grid-template-columns:auto 1fr;gap:1.5rem;align-items:center;background:rgba(255,255,255,.65);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.8);border-radius:24px;padding:1.75rem 2rem;margin-bottom:1.5rem;box-shadow:0 1px 2px rgba(15,23,42,.04),0 12px 36px -16px rgba(225,29,72,.18)}
.avatar{width:84px;height:84px;border-radius:24px;background:linear-gradient(135deg,#fecdd3 0%,#fda4af 60%,#fb7185 100%);display:flex;align-items:center;justify-content:center;font-size:48px;line-height:1;box-shadow:0 12px 30px -10px rgba(225,29,72,.45),inset 0 1px 0 rgba(255,255,255,.7)}
.hero-text h1{font-size:30px;font-weight:800;letter-spacing:-0.02em;background:linear-gradient(135deg,#e11d48 0%,#9f1239 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.hero-text .role{font-size:13px;color:var(--ink-2);margin-bottom:10px;font-weight:500}
.hero-text .tagline{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:5px;background:rgba(225,29,72,.08);color:var(--rose-dark);font-size:11.5px;font-weight:500;padding:4px 10px;border-radius:999px;letter-spacing:0.02em;position:relative}
.chip.gold{background:rgba(217,119,6,.08);color:#b45309}
.chip.ink{background:rgba(15,23,42,.06);color:var(--ink-2)}
.chip.green{background:rgba(5,150,105,.08);color:var(--green)}
.chip.blue{background:rgba(37,99,235,.08);color:#1d4ed8}

/* STATUS GRID */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:1.75rem}
.stat-card{background:rgba(255,255,255,.7);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.7);border-radius:16px;padding:14px 16px;display:flex;flex-direction:column;gap:4px;box-shadow:0 1px 2px rgba(15,23,42,.04);position:relative}
.stat-card .lbl{font-size:11px;color:var(--ink-3);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.stat-card .val{font-size:24px;font-weight:800;color:var(--ink);line-height:1.1}
.stat-card .sub{font-size:11.5px;color:var(--ink-2)}

/* SECTION */
.section{margin-bottom:2rem}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1rem;padding-bottom:8px;border-bottom:1px solid rgba(15,23,42,.06);gap:10px;flex-wrap:wrap}
.section-title{font-size:18px;font-weight:700;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
.section-title .em{font-size:20px}
.section-sub{font-size:12px;color:var(--ink-3)}

/* TIMELINE */
.timeline{position:relative;padding-left:24px;margin-left:6px}
.timeline::before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:linear-gradient(180deg,var(--rose) 0%,#fecdd3 100%);border-radius:2px}
.tl-item{position:relative;padding:6px 0 18px;font-size:13.5px;line-height:1.6}
.tl-item::before{content:"";position:absolute;left:-24px;top:11px;width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid var(--rose);box-shadow:0 0 0 3px rgba(225,29,72,.12)}
.tl-item.done::before{background:var(--green);border-color:var(--green)}
.tl-item.now::before{background:var(--rose);animation:pulse 2s infinite}
.tl-item.wait::before{background:#fff;border-color:var(--ink-4);box-shadow:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(225,29,72,.12)}50%{box-shadow:0 0 0 6px rgba(225,29,72,.05)}}
.tl-date{font-size:11.5px;color:var(--ink-3);font-weight:600;letter-spacing:0.5px;margin-bottom:2px}
.tl-title{font-weight:600;color:var(--ink);display:flex;align-items:center;gap:6px}
.tl-title > .litext{flex:1}
.tl-desc{color:var(--ink-2);margin-top:2px}
.tl-status-chip{font-size:10px;padding:1px 7px;border-radius:999px;background:rgba(15,23,42,.06);color:var(--ink-3);font-weight:600;letter-spacing:0.5px;cursor:default}
body.editing .tl-status-chip{cursor:pointer}
body.editing .tl-status-chip:hover{filter:brightness(.95)}

/* FILTER BAR */
.filter-bar{display:flex;flex-wrap:wrap;gap:14px 24px;align-items:center;background:rgba(255,255,255,.65);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.7);border-radius:14px;padding:10px 14px;margin-bottom:1rem}
.filter-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-group .lbl{font-size:11.5px;color:var(--ink-3);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.fchip{padding:5px 12px;border-radius:999px;background:rgba(15,23,42,.04);border:1px solid transparent;font-size:12.5px;color:var(--ink-2);cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
.fchip:hover{background:rgba(15,23,42,.07)}
.fchip.active{background:var(--rose);color:#fff;border-color:var(--rose)}
.fchip.active.alt{background:var(--green);border-color:var(--green)}
#search{flex:1;min-width:120px;padding:6px 12px;border:1px solid rgba(15,23,42,.08);border-radius:999px;font-size:13px;font-family:inherit;background:rgba(255,255,255,.8)}
#search:focus{outline:none;border-color:var(--rose);background:#fff}

/* MONTH GRID */
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.month-card{background:rgba(255,255,255,.78);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.85);border-radius:18px;padding:18px 20px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -16px rgba(15,23,42,.1)}
.month-card:hover{transform:translateY(-3px);box-shadow:0 1px 2px rgba(15,23,42,.04),0 20px 44px -18px rgba(225,29,72,.2)}
.month-card.expanded{transform:translateY(-2px);box-shadow:0 1px 2px rgba(15,23,42,.04),0 24px 50px -16px rgba(225,29,72,.25);border-color:rgba(225,29,72,.25);grid-column:1/-1}
.month-card .mhead{display:flex;align-items:center;gap:14px}
.mn{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:42px;font-weight:800;line-height:1;letter-spacing:-0.05em;background:linear-gradient(135deg,#e11d48 0%,#9f1239 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;min-width:60px}
.mhead-text{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
.mtitle{font-size:15.5px;font-weight:700;letter-spacing:-0.005em;line-height:1.3}
.mdate{font-size:11.5px;color:var(--ink-3);font-weight:500}
.status-tag{padding:3px 10px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:0.5px;color:var(--ink-2);align-self:flex-start;flex-shrink:0;background:rgba(15,23,42,.05);cursor:default}
.status-tag.done{background:var(--green-bg);color:var(--green)}
.status-tag.pending{background:var(--blue-bg);color:var(--blue)}
body.editing .status-tag{cursor:pointer}
body.editing .status-tag:hover{filter:brightness(.95)}

.mrow{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.mtag{display:inline-flex;align-items:center;gap:4px;font-size:11px;background:rgba(15,23,42,.05);color:var(--ink-2);padding:3px 9px;border-radius:6px;font-weight:500}
.mtag.store{background:rgba(225,29,72,.08);color:var(--rose-dark)}
.mtag.store.yc{background:rgba(37,99,235,.08);color:#1d4ed8}
.mtag.store.zh{background:rgba(5,150,105,.08);color:var(--green)}
.mtag.store.xz{background:rgba(217,119,6,.08);color:#b45309}
.mtag.all{background:rgba(15,23,42,.06);color:var(--ink)}
.mrow-quick{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--ink-2);line-height:1.5}
.mrow-quick b{color:var(--ink);font-weight:600}
.mexp-toggle{margin-top:auto;display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--rose);font-weight:600;letter-spacing:0.5px;padding-top:6px}
.mexp-toggle svg{transition:transform .2s}
.month-card.expanded .mexp-toggle svg{transform:rotate(180deg)}

/* MONTH DELETE BUTTON */
.month-del{display:none;position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;background:#fee2e2;color:#dc2626;border:none;cursor:pointer;font-size:14px;line-height:1;align-items:center;justify-content:center;font-weight:700;z-index:5}
body.editing .month-del{display:inline-flex}
.month-del:hover{background:#fecaca;transform:scale(1.1)}

/* EXPANDED CONTENT */
.mexp{display:none;padding-top:14px;margin-top:10px;border-top:1px dashed rgba(15,23,42,.1);font-size:13px;line-height:1.7}
.month-card.expanded .mexp{display:grid;grid-template-columns:1fr 1fr;gap:18px 28px}
.mexp h4{font-size:11.5px;color:var(--rose);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(225,29,72,.15);display:flex;align-items:center;justify-content:space-between}
.mexp .full{grid-column:1/-1}
.mexp .audience{font-size:12px;color:var(--ink-2);background:rgba(15,23,42,.03);padding:6px 12px;border-radius:8px;margin-bottom:10px}
.mexp .audience b{color:var(--ink);font-weight:600}
.mexp ul.editlist{list-style:none;padding:0;margin:0}
.mexp ul.editlist li{padding:5px 0;color:var(--ink-2);position:relative;padding-left:14px;display:flex;align-items:flex-start;gap:6px}
.mexp ul.editlist li::before{content:"·";position:absolute;left:4px;color:var(--rose);font-weight:700;top:5px}
.mexp ul.editlist li > .litext{flex:1}
.mexp .price-row{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:6px;padding:8px 12px;background:rgba(225,29,72,.04);border-radius:8px;margin-bottom:4px;font-size:12.5px}
.mexp .price-row .pname{font-weight:600;color:var(--ink)}
.mexp .price-row .pprice{display:flex;gap:6px;align-items:baseline}
.mexp .price-row .pprice s{color:var(--ink-3);font-size:12px}
.mexp .price-row .pprice b{color:var(--rose-dark);font-weight:700}
.mexp .pcontent{font-size:11.5px;color:var(--ink-3);padding:0 0 6px 12px;line-height:1.55}
.mexp .copy{background:rgba(15,23,42,.03);border-left:3px solid var(--rose);padding:8px 12px;margin:4px 0;font-style:italic;color:var(--ink);font-size:12.5px;border-radius:0 8px 8px 0;display:flex;align-items:flex-start;gap:6px}
.mexp .copy > .litext{flex:1}
.mexp .hook-card{background:linear-gradient(135deg,#fff1f2 0%,#fef3c7 100%);border-radius:12px;padding:12px 14px;border:1px solid rgba(225,29,72,.15)}
.mexp .hook-name{font-weight:700;font-size:14px;color:var(--rose-dark);margin-bottom:3px}
.mexp .hook-price{display:inline-block;background:var(--rose);color:#fff;font-weight:700;padding:2px 10px;border-radius:999px;font-size:11.5px;margin-bottom:8px}
.mexp .hook-desc{color:var(--ink-2);font-size:12.5px;line-height:1.6}
.mexp .forecast-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.mexp .fc-cell{background:rgba(255,255,255,.6);border-radius:8px;padding:6px 10px;font-size:12px}
.mexp .fc-cell .fclbl{font-size:10.5px;color:var(--ink-3);font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.mexp .fc-cell .fcval{font-weight:600;color:var(--ink)}
.mexp .risk{background:rgba(217,119,6,.06);border-left:3px solid var(--amber);padding:8px 12px;color:#92400e;font-size:12px;border-radius:0 8px 8px 0;margin-top:6px;line-height:1.6}
.mexp .risk b{color:#7c2d12}

/* EDIT MODE STYLES */
[data-path]{transition:all .15s}
body.editing [contenteditable=true]{outline:none;border-bottom:1px dashed rgba(225,29,72,.5);background:rgba(225,29,72,.04);border-radius:3px;cursor:text;min-width:30px}
body.editing [contenteditable=true]:hover{background:rgba(225,29,72,.08)}
body.editing [contenteditable=true]:focus{background:rgba(225,29,72,.1);border-bottom-color:#be123c;box-shadow:0 0 0 2px rgba(225,29,72,.15)}
body.editing [contenteditable=true]:empty::before{content:attr(data-placeholder);color:var(--ink-3);font-style:italic}
body.editing .chip [contenteditable=true],
body.editing .stat-card [contenteditable=true]{display:inline}

.add-btn{display:none;align-items:center;gap:4px;padding:4px 12px;border-radius:999px;border:1px dashed var(--rose);background:transparent;color:var(--rose);font-size:11.5px;font-family:inherit;cursor:pointer;margin-top:6px;font-weight:500}
.add-btn:hover{background:rgba(225,29,72,.05)}
body.editing .add-btn{display:inline-flex}
.add-month-btn{display:none;width:100%;align-items:center;justify-content:center;padding:18px;border-radius:18px;border:2px dashed rgba(225,29,72,.4);background:rgba(225,29,72,.02);color:var(--rose);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:14px;transition:all .2s}
.add-month-btn:hover{background:rgba(225,29,72,.05);border-color:var(--rose);transform:translateY(-2px)}
body.editing .add-month-btn{display:flex}

.del-btn{display:none;width:18px;height:18px;border-radius:50%;background:#fee2e2;color:#dc2626;border:none;font-size:11px;cursor:pointer;line-height:1;flex-shrink:0;align-self:center;font-weight:700}
.del-btn:hover{background:#fecaca}
body.editing .del-btn{display:inline-flex;align-items:center;justify-content:center}
.chip .del-btn{margin-left:2px;width:16px;height:16px;font-size:10px}
.stat-del{display:none;position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;background:#fee2e2;color:#dc2626;border:none;font-size:11px;cursor:pointer;line-height:1;font-weight:700;align-items:center;justify-content:center}
body.editing .stat-del{display:inline-flex}

#import-file{display:none}

/* KNOWLEDGE BASE */
.kb-card{background:rgba(255,255,255,.65);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.8);border-radius:18px;padding:20px 24px;margin-bottom:1rem;box-shadow:0 1px 2px rgba(15,23,42,.04)}
.kb-card details{cursor:pointer}
.kb-card summary{font-size:14px;font-weight:700;color:var(--ink);list-style:none;display:flex;align-items:center;justify-content:space-between;gap:8px}
.kb-card summary::-webkit-details-marker{display:none}
.kb-card summary svg{transition:transform .2s}
.kb-card details[open] summary svg{transform:rotate(180deg)}
.kb-content{padding-top:16px;font-size:13px;line-height:1.7;color:var(--ink-2)}
.kb-content h4{font-size:12px;color:var(--rose);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid rgba(225,29,72,.15)}
.kb-content table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}
.kb-content th,.kb-content td{padding:6px 10px;border-bottom:1px solid rgba(15,23,42,.06);text-align:left;vertical-align:top}
.kb-content th{font-weight:700;color:var(--ink);background:rgba(225,29,72,.04);font-size:11.5px}
.kb-content .principle{padding-left:18px;position:relative;margin:6px 0;display:flex;gap:6px;align-items:flex-start}
.kb-content .principle::before{content:"✦";position:absolute;left:0;color:var(--rose);font-weight:700;top:0}
.kb-content .principle > .litext{flex:1}
.kb-content .note{font-size:11.5px;color:var(--ink-3);font-style:italic;margin-top:4px}

/* FOOTER */
.foot{text-align:center;font-size:11px;color:var(--ink-3);letter-spacing:1px;margin-top:2rem;padding-top:1rem}
.foot .name{color:var(--rose);font-weight:600}

@media(max-width:980px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .month-grid{grid-template-columns:repeat(2,1fr)}
  .month-card.expanded .mexp{grid-template-columns:1fr}
}
@media(max-width:640px){
  body{padding:1rem}
  .hero{grid-template-columns:1fr;text-align:center;padding:1.5rem}
  .avatar{margin:0 auto}
  .month-grid{grid-template-columns:1fr}
  .hero-text h1{font-size:24px}
  .filter-bar{padding:10px}
  .stat-card .val{font-size:20px}
  .mn{font-size:34px;min-width:48px}
  .mexp .forecast-grid{grid-template-columns:1fr}
  .actions{order:3;width:100%;justify-content:flex-start}
}
</style>
</head>
<body>
<div class="stage">

  <div class="topbar">
    <a class="back-btn" href="home.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      返回主頁
    </a>
    <div class="actions">
      <button id="edit-toggle" class="action-btn" title="進入編輯模式">✏️ 編輯模式</button>
      <button id="export-btn" class="action-btn" title="匯出 JSON 備份">📤 匯出</button>
      <button id="import-btn" class="action-btn" title="從 JSON 匯入">📥 匯入</button>
      <input id="import-file" type="file" accept="application/json,.json">
      <button id="reset-btn" class="action-btn danger" title="清除所有編輯，回到預設">🔄 重置</button>
      <span id="save-status" class="save-status"></span>
    </div>
    <div class="brand-tag">
      <span class="dot"></span>
      <span>MARKETING · AI</span>
    </div>
  </div>

  <div class="edit-banner">

// Storage / Utils

function deepClone(o){ return JSON.parse(JSON.stringify(o)); }

function loadState(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved){
      const parsed = JSON.parse(saved);
      if(parsed && typeof parsed === 'object' && Array.isArray(parsed.months)){
        return mergeWithDefault(parsed);
      }
    }
    // v2 → v3 自動遷移：v2 是純 12 個月陣列
    const v2 = localStorage.getItem(LEGACY_V2_KEY);
    if(v2){
      const v2Months = JSON.parse(v2);
      if(Array.isArray(v2Months)){
        const fresh = deepClone(DEFAULT_STATE);
        fresh.months = v2Months;
        return fresh;
      }
    }
  }catch(e){}
  return deepClone(DEFAULT_STATE);
}
function mergeWithDefault(s){
  // 任何缺少的頂層欄位用預設補
  const def = deepClone(DEFAULT_STATE);
  return {
    hero: s.hero || def.hero,
    stats: s.stats || def.stats,
    timeline: s.timeline || def.timeline,
    knowledge: s.knowledge || def.knowledge,
    months: s.months || def.months,
    footer: s.footer != null ? s.footer : def.footer,
  };
}

let STATE = loadState();
let saveTimer = null;
function saveState(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
      flashSaved();
    }catch(e){
      const s = document.getElementById('save-status');
      if(s){ s.textContent = '⚠ 存檔失敗'; s.style.color = '#dc2626'; }
    }
  }, 250);
}
function flashSaved(){
  const s = document.getElementById('save-status');
  if(!s) return;
  const ts = new Date().toLocaleTimeString('zh-TW', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
  s.textContent = '✓ 已存 ' + ts;
  s.style.color = 'var(--green)';
  clearTimeout(s._t);
  s._t = setTimeout(() => { s.textContent = ''; }, 2500);
}
function setByPath(obj, path, value){
  const keys = path.split('.');
  let cur = obj;
  for(let i = 0; i < keys.length - 1; i++){
    const k = keys[i];
    cur = isNaN(k) ? cur[k] : cur[parseInt(k)];
    if(cur == null) return;
  }
  const last = keys[keys.length - 1];
  if(isNaN(last)) cur[last] = value;
  else cur[parseInt(last)] = value;
}
function escapeHtml(s){
  if(s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function storeClass(s){
  if (s === '永春') return 'yc';
  if (s === '中和') return 'zh';
  if (s === '新莊') return 'xz';
  return 'all';
}
let curStore = 'all', curStatus = 'all', curQ = '';

function renderMonths(){
  const grid = document.getElementById('month-grid');
  const sum = document.getElementById('filter-summary');
  const q = curQ.trim().toLowerCase();
  const list = STATE.months.filter(m => {
    if (curStatus !== 'all' && m.status !== curStatus) return false;
    if (curStore !== 'all' && !(m.mainStore||'').includes(curStore) && !(m.stores||[]).includes(curStore)) return false;
    if (q) {
      const blob = JSON.stringify(m).toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
  sum.textContent = '符合 ' + list.length + ' / ' + STATE.months.length + ' 個月' + (q ? ' · 關鍵字「' + q + '」' : '');

  grid.innerHTML = list.map(m => {
    const idx = STATE.months.indexOf(m);
    return renderMonthCard(m, idx);
  }).join('');
}

        <div class="mhead-text">
          <div class="mtitle" data-path="months.${idx}.title" data-single="1">${escapeHtml(m.title)}</div>
          <div class="mdate" data-path="months.${idx}.date" data-single="1">${escapeHtml(m.date)}</div>
        </div>
        <span class="status-tag ${m.status}" data-action="cycle-month-status" data-j="${idx}" title="點擊切換狀態">${m.status === 'done' ? '已執行' : '待執行'}</span>
      </div>
      <div class="mrow">
        <span class="mtag store ${storeClass(m.mainStore)}">主推 · <span data-path="months.${idx}.mainStore" data-single="1">${escapeHtml(m.mainStore)}</span></span>
        ${(m.stores||[]).length === 3 ? '<span class="mtag all">三店活動統一</span>' : ''}
      </div>
      <div class="mrow-quick">
        <span><b>套餐：</b>${escapeHtml(m.packages[0]?.name || '')}（活動 ${escapeHtml(m.packages[0]?.price || '')}）</span>
      </div>
      <div class="mrow-quick">
        <span><b>記憶點：</b><span data-path="months.${idx}.hook.price" data-single="1">${escapeHtml(m.hook.price)}</span> · <span data-path="months.${idx}.hook.name" data-single="1">${escapeHtml(m.hook.name)}</span></span>
      </div>
      <div class="mexp-toggle">
        <span>展開完整詳案</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      ${renderExpand(m, idx)}
    </div>
  `;
}

function renderExpand(m, idx){
  const pkgsHtml = m.packages.map((p, j) => `
    <div class="price-row">
      <span class="pname" data-path="months.${idx}.packages.${j}.name" data-single="1">${escapeHtml(p.name)}</span>
      <span class="pprice">
        <s data-path="months.${idx}.packages.${j}.original" data-single="1">${escapeHtml(p.original)}</s> →
        <b data-path="months.${idx}.packages.${j}.price" data-single="1">${escapeHtml(p.price)}</b>
        <button class="del-btn" data-action="del-package" data-idx="${idx}" data-j="${j}" title="刪除這個套餐">×</button>
      </span>
    </div>
    <div class="pcontent" data-path="months.${idx}.packages.${j}.content">${escapeHtml(p.content)}</div>
  `).join('');

  const opsHtml = m.ops.map((op, j) => `
    <li>
      <span class="litext" data-path="months.${idx}.ops.${j}">${escapeHtml(op)}</span>
      <button class="del-btn" data-action="del-op" data-idx="${idx}" data-j="${j}" title="刪除這個操作">×</button>
    </li>
  `).join('');

  const copyHtml = m.copy.map((c, j) => `
    <div class="copy">
      <span class="litext" data-path="months.${idx}.copy.${j}">${escapeHtml(c)}</span>
      <button class="del-btn" data-action="del-copy" data-idx="${idx}" data-j="${j}" title="刪除這個文案">×</button>
    </div>
  `).join('');

  return `
    <div class="mexp" onclick="event.stopPropagation()">
      <div>
        <div class="audience" data-path="months.${idx}.audience"><b>目標客群：</b>${escapeHtml(m.audience)}</div>
        <h4>套餐設計</h4>
        <div>${pkgsHtml}</div>
        <button class="add-btn" data-action="add-package" data-idx="${idx}">+ 新增套餐</button>
      </div>
      <div>
        <h4>1 元加購記憶點</h4>
        <div class="hook-card">
          <div class="hook-name" data-path="months.${idx}.hook.name" data-single="1">${escapeHtml(m.hook.name)}</div>
          <span class="hook-price" data-path="months.${idx}.hook.price" data-single="1">${escapeHtml(m.hook.price)}</span>
          <div class="hook-desc" data-path="months.${idx}.hook.desc">${escapeHtml(m.hook.desc)}</div>
        </div>
      </div>
      <div class="full">
        <h4>全店通用操作（三店一致）</h4>
        <ul class="editlist">${opsHtml}</ul>
        <button class="add-btn" data-action="add-op" data-idx="${idx}">+ 新增操作</button>
      </div>
      <div class="full">
        <h4>宣傳文案 / Hook</h4>
        ${copyHtml}
        <button class="add-btn" data-action="add-copy" data-idx="${idx}">+ 新增文案</button>
      </div>
      <div class="full">
        <h4>預估與風險</h4>
        <div class="forecast-grid">
          <div class="fc-cell"><div class="fclbl">平日翻桌</div><div class="fcval" data-path="months.${idx}.forecast.weekday" data-single="1">${escapeHtml(m.forecast.weekday)}</div></div>
          <div class="fc-cell"><div class="fclbl">假日翻桌</div><div class="fcval" data-path="months.${idx}.forecast.weekend" data-single="1">${escapeHtml(m.forecast.weekend)}</div></div>
          <div class="fc-cell"><div class="fclbl">客單變化</div><div class="fcval" data-path="months.${idx}.forecast.aov" data-single="1">${escapeHtml(m.forecast.aov)}</div></div>
          <div class="fc-cell"><div class="fclbl">加購補貼成本</div><div class="fcval" data-path="months.${idx}.forecast.cost" data-single="1">${escapeHtml(m.forecast.cost)}</div></div>
        </div>
        <div class="risk">⚠ <b>風險：</b><span data-path="months.${idx}.forecast.risk">${escapeHtml(m.forecast.risk)}</span></div>
      </div>
      <div class="full" style="text-align:right;font-size:11px;color:var(--ink-3)">— 小行 / Xiao-Xing</div>
    </div>
  `;
}

// =====================================================
// Render: FOOTER
// =====================================================
function renderFooter(){
  document.getElementById('footer-area').innerHTML = `<span data-path="footer" data-single="1">${escapeHtml(STATE.footer)}</span>`;
}

// =====================================================
// Render all
// =====================================================
function renderAll(){
  renderHero();
  renderStats();
  renderTimeline();
  renderKnowledge();
  renderMonths();
  renderFooter();
  applyEditableState();
}

// =====================================================
// Edit mode
// =====================================================
let editing = false;

function applyEditableState(){
  document.querySelectorAll('[data-path]').forEach(el => {
    if(editing){
      el.setAttribute('contenteditable', 'true');
      el.setAttribute('spellcheck', 'false');
    } else {
      el.removeAttribute('contenteditable');
      el.removeAttribute('spellcheck');
    }
  });
}

function toggleEdit(){
  editing = !editing;
  document.body.classList.toggle('editing', editing);
  const btn = document.getElementById('edit-toggle');
  btn.classList.toggle('active', editing);
  btn.textContent = editing ? '✓ 完成編輯' : '✏️ 編輯模式';
  applyEditableState();
}

// =====================================================
// Structure handlers
// =====================================================
function handleStructure(action, idx, j){
  if(action === 'del-month'){
    if(STATE.months.length <= 1){ alert('至少要保留 1 個月份。'); return; }
    if(!confirm('確定刪除這個月份？此操作無法復原（建議先匯出備份）。')) return;
    STATE.months.splice(j, 1);
    saveState(); renderMonths(); applyEditableState(); return;
  }
  if(action === 'add-month'){
    STATE.months.push(makeBlankMonth());
    saveState(); renderMonths(); applyEditableState(); return;
  }
  if(action === 'cycle-month-status'){
    const m = STATE.months[j];
    m.status = m.status === 'done' ? 'pending' : 'done';
    saveState(); renderMonths(); applyEditableState(); return;
  }
  if(action === 'cycle-tl-status'){
    const t = STATE.timeline[j];
    const i = TL_STATUSES.indexOf(t.status);
    t.status = TL_STATUSES[(i + 1) % TL_STATUSES.length];
    saveState(); renderTimeline(); applyEditableState(); return;
  }
  if(action === 'add-timeline'){
    STATE.timeline.push({ date: new Date().toISOString().slice(0,10), status: 'wait', title: '新事件', desc: '說明' });
    saveState(); renderTimeline(); applyEditableState(); return;
  }
  if(action === 'del-timeline'){
    if(STATE.timeline.length <= 1){ alert('至少要保留 1 條工作軌跡。'); return; }
    if(!confirm('刪除這筆工作軌跡？')) return;
    STATE.timeline.splice(j, 1);
    saveState(); renderTimeline(); applyEditableState(); return;
  }
  if(action === 'add-chip'){
    STATE.hero.chips.push({ text: '新 tag', cls: 'ink' });
    saveState(); renderHero(); applyEditableState(); return;
  }
  if(action === 'del-chip'){
    STATE.hero.chips.splice(j, 1);
    saveState(); renderHero(); applyEditableState(); return;
  }
  if(action === 'add-stat'){
    STATE.stats.push({ lbl: '新項目', val: '0', sub: '說明' });
    saveState(); renderStats(); applyEditableState(); return;
  }
  if(action === 'del-stat'){
    if(STATE.stats.length <= 1){ alert('至少要保留 1 格統計。'); return; }
    if(!confirm('刪除這個統計格？')) return;
    STATE.stats.splice(j, 1);
    saveState(); renderStats(); applyEditableState(); return;
  }
  if(action === 'add-principle'){
    STATE.knowledge.principles.items.push('新的設計原則');
    saveState(); renderKnowledge(); applyEditableState(); return;
  }
  if(action === 'del-principle'){
    if(STATE.knowledge.principles.items.length <= 1){ alert('至少要保留 1 條原則。'); return; }
    if(!confirm('刪除這條原則？')) return;
    STATE.knowledge.principles.items.splice(j, 1);
    saveState(); renderKnowledge(); applyEditableState(); return;
  }

  // Month-internal arrays
  const m = STATE.months[idx];
  if(!m) return;
  if(action === 'add-package'){
    m.packages.push({ name: '新套餐', original: '原價', price: '活動價', content: '套餐內容' });
  } else if(action === 'del-package'){
    if(m.packages.length <= 1){ alert('至少要保留 1 個套餐。'); return; }
    if(!confirm('刪除這個套餐？')) return;
    m.packages.splice(j, 1);
  } else if(action === 'add-op'){
    m.ops.push('新的操作說明');
  } else if(action === 'del-op'){
    if(m.ops.length <= 1){ alert('至少要保留 1 條操作。'); return; }
    if(!confirm('刪除這條操作？')) return;
    m.ops.splice(j, 1);
  } else if(action === 'add-copy'){
    m.copy.push('新文案');
  } else if(action === 'del-copy'){
    if(m.copy.length <= 1){ alert('至少要保留 1 條文案。'); return; }
    if(!confirm('刪除這條文案？')) return;
    m.copy.splice(j, 1);
  } else { return; }
  saveState();
  const wasExpanded = document.querySelector('.month-card[data-idx="' + idx + '"]')?.classList.contains('expanded');
  renderMonths();
  applyEditableState();
  if(wasExpanded){
    document.querySelector('.month-card[data-idx="' + idx + '"]')?.classList.add('expanded');
  }
}

function makeBlankMonth(){
  const next = STATE.months.length + 1;
  return {
    month: next, title: '新月份主題', date: '檔期日期', status: 'pending',
    stores: ['永春','中和','新莊'], mainStore: '全店',
    audience: '目標客群描述',
    packages: [{ name: '套餐名稱', original: '原價', price: '活動價', content: '套餐內容' }],
    hook: { name: '加購品名稱', price: '1 元加購', desc: '視覺/儀式賣點描述' },
    ops: ['全店通用操作 1'],
    copy: ['宣傳文案 1'],
    forecast: { weekday: '+0%', weekend: '+0%', aov: '~500', cost: '< 20 元/份', risk: '風險點' },
  };
}

// =====================================================
// Event delegation
// =====================================================
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if(btn){
    e.stopPropagation();
    const action = btn.dataset.action;
    const idx = btn.dataset.idx != null ? parseInt(btn.dataset.idx) : -1;
    const j = btn.dataset.j != null ? parseInt(btn.dataset.j) : -1;
    handleStructure(action, idx, j);
    return;
  }
  const sBtn = e.target.closest('.fchip[data-store]');
  if(sBtn){
    document.querySelectorAll('.fchip[data-store]').forEach(x => x.classList.remove('active'));
    sBtn.classList.add('active');
    curStore = sBtn.dataset.store;
    renderMonths(); applyEditableState();
    return;
  }
  const stBtn = e.target.closest('.fchip[data-status]');
  if(stBtn){
    document.querySelectorAll('.fchip[data-status]').forEach(x => x.classList.remove('active'));
    stBtn.classList.add('active');
    curStatus = stBtn.dataset.status;
    renderMonths(); applyEditableState();
    return;
  }
  const card = e.target.closest('.month-card');
  if(card && !e.target.closest('[contenteditable=true]') && !e.target.closest('button') && !e.target.closest('.mexp')){
    card.classList.toggle('expanded');
  }
});

document.addEventListener('input', e => {
  const el = e.target.closest('[data-path]');
  if(!el || el.getAttribute('contenteditable') !== 'true') return;
  const path = el.dataset.path;
  if(!path) return;
  setByPath(STATE, path, el.textContent);
  saveState();
});

document.addEventListener('keydown', e => {
  if(e.key !== 'Enter') return;
  const el = e.target.closest('[data-single="1"][contenteditable=true]');
  if(el){ e.preventDefault(); el.blur(); }
});

document.addEventListener('paste', e => {
  const el = e.target.closest('[contenteditable=true]');
  if(!el) return;
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text');
  document.execCommand('insertText', false, text);
});

document.getElementById('search').addEventListener('input', e => {
  curQ = e.target.value;
  renderMonths(); applyEditableState();
});

document.getElementById('edit-toggle').addEventListener('click', toggleEdit);

document.getElementById('export-btn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(STATE, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'xiaoxing-state-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('import-btn').addEventListener('click', () => {
  document.getElementById('import-file').click();
});
document.getElementById('import-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const parsed = JSON.parse(ev.target.result);
      let next;
      if(Array.isArray(parsed)){
        // 舊版 v2 格式：純 12 個月陣列
        next = deepClone(DEFAULT_STATE);
        next.months = parsed;
      } else if(parsed && typeof parsed === 'object' && Array.isArray(parsed.months)){
        next = mergeWithDefault(parsed);
      } else {
        alert('JSON 結構不對：應為 STATE 物件或月份陣列。');
        return;
      }
      STATE = next;
      saveState();
      renderAll();
      alert('匯入成功 ✓');
    }catch(err){
      alert('JSON 解析失敗：' + err.message);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if(!confirm('確定要重置所有編輯回到預設？\n\n已編輯的內容會消失（建議先按「匯出」備份）。')) return;
  localStorage.removeItem(STORAGE_KEY);
  STATE = deepClone(DEFAULT_STATE);
  saveState();
  renderAll();
});

// =====================================================
// Init
// =====================================================
renderAll();
</script>
