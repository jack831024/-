<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#c2410c" />
<title>秘密客連結產生器</title>
<style>
:root{--bg:#fbf3ea;--surface:#fff;--line:#f0ddcb;--ink:#3d2b21;--muted:#93786a;--brand:#c2410c;--brand2:#ea6a2b;--ok:#1e7d46}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;line-height:1.5}
.wrap{max-width:560px;margin:0 auto;padding:18px 16px calc(40px + env(safe-area-inset-bottom))}
.head{display:flex;align-items:center;gap:12px;margin:8px 0 18px}
.mark{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800}
.head .eyebrow{font-size:12px;color:var(--brand);font-weight:700;letter-spacing:1px;margin:0}
.head h1{font-size:20px;margin:2px 0 0}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 8px 24px rgba(141,78,36,.06);margin-bottom:14px}
label{display:block;font-size:13.5px;font-weight:700;margin-bottom:7px}
.row{display:flex;gap:8px}
input,textarea{width:100%;font-family:inherit;font-size:16px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 12px;outline:none}
input:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(194,65,12,.12)}
textarea{resize:vertical;min-height:64px;line-height:1.5}
.field{margin-bottom:14px}
.hint{font-size:12px;color:var(--muted);margin:6px 0 0;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;border-radius:11px;font-weight:700;transition:transform .12s,opacity .15s}
button:active{transform:scale(.97)}
.btn-mini{background:#f4e7da;color:var(--brand);font-size:13px;padding:0 14px;white-space:nowrap}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-size:16px;padding:13px;margin-top:4px}
.out{display:none}
.out.show{display:block}
.linkbox{display:flex;gap:8px;align-items:stretch}
.linkbox input{font-size:13px;background:#fdf6ee}
.btn-copy{background:var(--brand);color:#fff;font-size:14px;padding:0 16px}
.btn-copy.done{background:var(--ok)}
.preview{margin-top:12px;font-size:13px;color:var(--muted)}
.preview a{color:var(--brand)}
.qr{margin-top:12px;text-align:center}
.qr img{max-width:180px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:8px}
.toast{position:fixed;left:50%;top:16px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;padding:10px 18px;border-radius:12px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:9}
.toast.show{opacity:1}
</style>
</head>
<body>
<main class="wrap">
  <div class="head">
    <div class="mark">初</div>
    <div><p class="eyebrow">初殿鍋物 · 總部工具</p><h1>秘密客連結產生器</h1></div>
  </div>

  <div class="card">
    <div class="field">
      <label>秘密客代號</label>
      <div class="row">
        <input id="code" type="text" placeholder="例如 MS-260622-A1B" />
        <button type="button" class="btn-mini" id="regen">重新產生</button>
      </div>
      <p class="hint">每條連結用一個代號，送出後該代號就失效（不能重複填）。可自己改。</p>
    </div>

    <div class="field">
      <label>指定套餐 / 餐點內容</label>
      <textarea id="meal" rows="3" placeholder="例如：招牌牛肉鍋 ×1，加點霜降牛、雪花魚卷；請點湯頭兌換券"></textarea>
      <p class="hint">秘密客打開連結會看到這段（唯讀），門市則由秘密客自己選。</p>
    </div>

    <button type="button" class="btn-primary" id="gen">產生連結</button>
  </div>

  <div class="card out" id="out">
    <label>專屬連結（傳給秘密客）</label>
    <div class="linkbox">
      <input id="link" type="text" readonly />
      <button type="button" class="btn-copy" id="copy">複製</button>
    </div>
    <div class="preview">代號 <b id="pCode"></b> · <a id="open" target="_blank" rel="noopener">開啟預覽</a></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
function genCode(){
  var d = new Date();
  var ymd = String(d.getFullYear()).slice(2) + String(d.getMonth()+1).padStart(2,"0") + String(d.getDate()).padStart(2,"0");
  var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  var rnd = "";
  for(var i=0;i<3;i++) rnd += chars[Math.floor(Math.random()*chars.length)];
  return "MS-" + ymd + "-" + rnd;
}
function toast(msg){
  var t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show";
  clearTimeout(toast._t); toast._t = setTimeout(function(){ t.className = "toast"; }, 1800);
}
// 打分頁 = 同資料夾的 index.html
function scoreBase(){
  return new URL("index.html", location.href).toString().split("?")[0];
}

document.getElementById("code").value = genCode();
document.getElementById("regen").addEventListener("click", function(){
  document.getElementById("code").value = genCode();
});

document.getElementById("gen").addEventListener("click", function(){
  var code = document.getElementById("code").value.trim();
  var meal = document.getElementById("meal").value.trim();
  if(!code){ toast("請填秘密客代號"); return; }
  var url = scoreBase() + "?code=" + encodeURIComponent(code) + (meal ? "&meal=" + encodeURIComponent(meal) : "");
  document.getElementById("link").value = url;
  document.getElementById("pCode").textContent = code;
  document.getElementById("open").href = url;
  document.getElementById("out").classList.add("show");
  document.getElementById("out").scrollIntoView({ behavior:"smooth", block:"nearest" });
});

document.getElementById("copy").addEventListener("click", async function(){
  var url = document.getElementById("link").value;
  try{ await navigator.clipboard.writeText(url); }
  catch(e){ var i=document.getElementById("link"); i.select(); document.execCommand("copy"); }
  var b = document.getElementById("copy"); b.textContent = "已複製"; b.classList.add("done");
  toast("已複製連結"); setTimeout(function(){ b.textContent="複製"; b.classList.remove("done"); }, 1600);
});
</script>
</body>
</html>
