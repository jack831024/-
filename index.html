<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>選擇門市</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#3b82f6;
  --brand-dark:#2563eb;
  --accent:#f97316;
  --ink:#0f172a;
  --ink-2:#475569;
  --ink-3:#94a3b8;
  --line:#e2e8f0;
}
html,body{height:100%}
body{font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);min-height:100vh;padding:1.5rem;position:relative;overflow-x:hidden;
  background:
    radial-gradient(1200px 600px at 10% -10%, #dbeafe 0%, transparent 50%),
    radial-gradient(900px 500px at 110% 10%, #fde4d3 0%, transparent 55%),
    radial-gradient(800px 600px at 50% 120%, #e0e7ff 0%, transparent 60%),
    linear-gradient(180deg,#f8fafc 0%,#eef2f7 100%);
}

.back-btn{position:fixed;top:20px;left:20px;width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-2);transition:all .2s;box-shadow:0 4px 12px -4px rgba(15,23,42,.1);z-index:10}
.back-btn:hover{background:#fff;color:var(--brand);transform:translateX(-2px);box-shadow:0 8px 20px -6px rgba(15,23,42,.15)}
.back-btn svg{width:18px;height:18px}

.stage{max-width:560px;margin:0 auto;padding:3rem 0 2rem}
.brand-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:1.75rem;color:var(--ink-2);font-size:11px;letter-spacing:3px;font-weight:500;text-transform:uppercase}
.brand-row .dot{width:6px;height:6px;border-radius:50%;background:var(--brand);box-shadow:0 0 12px var(--brand)}

.hero{text-align:center;margin-bottom:2rem}
.hero-logo{width:72px;height:72px;margin:0 auto 1rem;border-radius:20px;background:linear-gradient(135deg,#fff 0%,#f1f5f9 100%);box-shadow:0 10px 30px -10px rgba(59,130,246,.35),0 0 0 1px rgba(15,23,42,.04),inset 0 1px 0 rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:36px;line-height:1}
h1{font-size:24px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;background:linear-gradient(135deg,#0f172a 0%,#475569 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:13px;color:var(--ink-2)}
.flow-tag{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:5px 12px;border-radius:999px;background:rgba(59,130,246,.08);color:var(--brand);font-size:12px;font-weight:600;letter-spacing:0.02em}
.flow-tag.inventory{background:rgba(249,115,22,.1);color:var(--accent)}
.flow-tag .pulse{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 0 0 currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(59,130,246,.4)}70%{box-shadow:0 0 0 8px rgba(59,130,246,0)}100%{box-shadow:0 0 0 0 rgba(59,130,246,0)}}

.store-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
.store-btn{background:rgba(255,255,255,.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.8);border-radius:18px;padding:1.25rem 1rem;cursor:pointer;transition:all .22s cubic-bezier(.4,0,.2,1);text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:inherit;color:inherit;position:relative;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,.04),0 6px 18px -10px rgba(15,23,42,.1)}
.store-btn::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .22s}
.store-btn:hover{transform:translateY(-3px);box-shadow:0 1px 2px rgba(15,23,42,.04),0 18px 36px -14px rgba(15,23,42,.15)}
.store-btn:hover::after{opacity:1}
.store-btn:active{transform:translateY(-1px)}

.store-btn .icon-wrap{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;line-height:1;margin-bottom:4px;transition:all .22s}
.store-btn .brand-label{font-size:10px;color:var(--ink-3);font-weight:600;letter-spacing:2px;text-transform:uppercase}
.store-btn .name{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-0.01em}

.store-btn.chudian .icon-wrap{background:linear-gradient(135deg,#fed7aa 0%,#fdba74 100%);color:var(--accent)}
.store-btn.chudian::after{background:linear-gradient(90deg,var(--accent),#fb923c)}
.store-btn.chudian:hover .icon-wrap{background:linear-gradient(135deg,var(--accent) 0%,#fb923c 100%);color:#fff;transform:scale(1.06)}
.store-btn.shicheng .icon-wrap{background:linear-gradient(135deg,#dbeafe 0%,#bfdbfe 100%);color:var(--brand)}
.store-btn.shicheng::after{background:linear-gradient(90deg,var(--brand),#60a5fa)}
.store-btn.shicheng:hover .icon-wrap{background:linear-gradient(135deg,var(--brand) 0%,#60a5fa 100%);color:#fff;transform:scale(1.06)}

.footer{text-align:center;font-size:11px;color:var(--ink-3);letter-spacing:1px;margin-top:.5rem}

@media(max-width:420px){
  body{padding:1rem}
  .stage{padding:1.5rem 0 1rem}
  .store-grid{grid-template-columns:1fr}
  .back-btn{top:14px;left:14px}
}
</style>
</head>
<body>

<button class="back-btn" onclick="location.href='home.html'" title="返回主頁">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
</button>

<div class="stage">
  <div class="brand-row">
    <span class="dot"></span>
    <span>STORE · SELECTION</span>
  </div>

  <div class="hero">
    <div class="hero-logo">🏪</div>
    <h1>選擇門市</h1>
    <p class="subtitle">請選擇您要進入的門市</p>
    <div id="flow-indicator"></div>
  </div>

  <div class="store-grid">
    <button class="store-btn chudian" onclick="selectStore('chudian-zhonghe','初殿中和店')">
      <span class="icon-wrap">🍲</span>
      <span class="brand-label">CHUDIAN</span>
      <span class="name">中和店</span>
    </button>
    <button class="store-btn chudian" onclick="selectStore('chudian-yongchun','初殿永春店')">
      <span class="icon-wrap">🍲</span>
      <span class="brand-label">CHUDIAN</span>
      <span class="name">永春店</span>
    </button>
    <button class="store-btn chudian" onclick="selectStore('chudian-xinzhuang','初殿新莊店')">
      <span class="icon-wrap">🍲</span>
      <span class="brand-label">CHUDIAN</span>
      <span class="name">新莊店</span>
    </button>
    <button class="store-btn shicheng" onclick="selectStore('shicheng-zhongxiao','十城忠孝店')">
      <span class="icon-wrap">🏮</span>
      <span class="brand-label">SHICHENG</span>
      <span class="name">忠孝店</span>
    </button>
  </div>

  <p class="footer">© INTERNAL SYSTEM</p>
</div>

<script>
// 顯示目前流程（由主頁帶入）
(function(){
  var flow = sessionStorage.getItem('cd_flow');
  var el = document.getElementById('flow-indicator');
  if(!flow){ return; }
  var cls = flow === 'inventory' ? 'inventory' : '';
  var icon = flow === 'inventory' ? '📦' : '📋';
  var label = flow === 'inventory' ? '盤點表' : '小結報表';
  el.innerHTML = '<span class="flow-tag '+cls+'"><span class="pulse"></span>'+icon+' '+label+'</span>';
})();

// 各店密碼（客戶端驗證，防一般員工誤入，不是高強度安全）
var STORE_PASSWORDS = {
  'chudian-zhonghe':    '90369287',
  'chudian-yongchun':   '94213054',
  'chudian-xinzhuang':  '60749791',
  'shicheng-zhongxiao': '61222042'
};

function selectStore(id, name){
  var flow = sessionStorage.getItem('cd_flow');
  // 盤點表流程：免密碼、免登入
  if(flow !== 'inventory'){
    var expected = STORE_PASSWORDS[id];
    if(expected){
      var input = prompt('請輸入【' + name + '】密碼：');
      if(input === null) return;
      if(String(input).trim() !== expected){
        alert('❌ 密碼錯誤');
        return;
      }
    }
  }
  sessionStorage.setItem('cd_store', id);
  sessionStorage.setItem('cd_store_name', name);
  window.location.href = (flow === 'inventory') ? 'inventory.html' : 'daily-summary.html';
}
</script>
</body>
</html>
